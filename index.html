                  className="field-input w-full rounded-xl px-4 py-3 text-white placeholder-white/25 text-[15px] resize-none"
                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}

                <button type="submit"

            </form>
          </div>

      );

    /* ── 10a. AddProcedureModal ──────────────────────────────────── */
    function AddProcedureModal({ patientId, onAdd, onClose }) {
      const [name,     setName]     = useState('');
      const [date,     setDate]     = useState(new Date().toISOString().split('T')[0]);
      const [notes,    setNotes]    = useState('');
      const [category, setCategory] = useState('dental');

      const submit = (e) => {
        e.preventDefault();
        if (!name.trim()) return;
        onAdd({
          id:        'PROC_' + Date.now(),
          patientId,
          name:      name.trim(),
          date,
          notes:     notes.trim(),
          category,
          createdAt: Date.now(),
        });
      };

      const CATEGORY_CONFIG = {
        dental: { label: 'Dental', color: '#f43f5e', bg: 'rgba(244,63,94,0.15)', border: 'rgba(244,63,94,0.4)' },
        face:   { label: 'Face',   color: '#a5b4fc', bg: 'rgba(99,102,241,0.15)',  border: 'rgba(99,102,241,0.4)' },
        both:   { label: 'Both',   color: '#d8b4fe', bg: 'rgba(168,85,247,0.15)', border: 'rgba(168,85,247,0.4)' },
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end"
          style={{background:'var(--pg-overlay)', backdropFilter:'blur(8px)'}}>
          <div className="w-full rounded-t-3xl px-5 pt-4 pb-safe slide-up"
            style={{background:'var(--pg-modal)', border:'1px solid var(--pg-border-hi)', borderBottom:'none'}}>
            {/* Drag handle */}
            <div className="drag-handle" />
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-white text-[18px] font-bold">New Procedure</h2>
              <button onClick={onClose}
                className="w-8 h-8 rounded-xl flex items-center justify-center active:opacity-70"
                style={{background:'var(--pg-surface-hi)'}}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M1 1l10 10M11 1L1 11" stroke="var(--pg-t2)" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </button>
            </div>
            <form onSubmit={submit} className="space-y-3.5">
              <div>
                <label className="section-label block mb-1.5">Procedure Name *</label>
                <input type="text" required autoFocus value={name}
                  onChange={e => setName(e.target.value)}
                  placeholder="e.g. Crown Fitting, Teeth Whitening"
                  className="field-input w-full rounded-xl px-4 py-3.5 text-white placeholder-white/25 text-[15px]"
                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}
                />
              </div>
              <div>
                <label className="section-label block mb-1.5">Date</label>
                <input type="date" value={date}
                  onChange={e => setDate(e.target.value)}
                  className="field-input w-full rounded-xl px-4 py-3.5 text-white text-[15px]"
                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}
                />
              </div>
              <div>
                <label className="section-label block mb-2">Category</label>
                <div className="flex gap-2">
                  {(['dental', 'face', 'both']).map(c => {
                    const cfg = CATEGORY_CONFIG[c];
                    const active = category === c;
                    return (
                      <button key={c} type="button" onClick={() => setCategory(c)}
                        className="flex-1 py-3 rounded-xl text-sm font-semibold transition-all active:scale-95"
                        style={active
                          ? {background:cfg.bg, border:`1px solid ${cfg.border}`, color:cfg.color}
                          : {background:'var(--pg-surface)', border:'1px solid var(--pg-border)', color:'rgba(255,255,255,0.4)'}}>
                        {cfg.label}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div>
                <label className="section-label block mb-1.5">Notes</label>
                <textarea rows={2} value={notes}
                  onChange={e => setNotes(e.target.value)}
                  placeholder="Additional notes…"
                  className="field-input w-full rounded-xl px-4 py-3 text-white placeholder-white/25 text-[15px] resize-none"
                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}
                />
              </div>
              <div className="flex gap-3 pt-1 pb-2">
                <button type="button" onClick={onClose}
                  className="flex-1 py-4 rounded-xl text-white/70 font-semibold text-[15px] active:scale-[0.98] transition-transform btn-secondary">
                  Cancel
                </button>
                <button type="submit"
                  className="flex-1 py-4 rounded-xl text-white font-semibold text-[15px] active:scale-[0.98] transition-transform btn-primary">
                  Add Procedure
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    /* ── 10b. PatientDetailView (now shows procedures list) ──────── */
    function PatientDetailView({ patient, onBack, onOpenProcedure, onAddProcedure }) {
      const [procedures, setProcedures] = useState([]);
      const [photoCounts, setPhotoCounts] = useState({});
      const [showAddProc, setShowAddProc] = useState(false);

      const load = useCallback(async () => {
        const procs = await DB.getProceduresByPatient(patient.id);
        setProcedures(procs.sort((a, b) => b.createdAt - a.createdAt));
        const counts = {};
        for (const proc of procs) {
          const photos = await DB.getPhotosByProcedure(proc.id);
          counts[proc.id] = photos.length;
        }
        setPhotoCounts(counts);
      }, [patient.id]);

      useEffect(() => { load(); }, [load]);

      const handleAddProcedure = async (proc) => {
        await DB.saveProcedure(proc);
        enqueueFirebaseSync('sync_procedure', proc).catch(() => {});
        setShowAddProc(false);
        load();
      };

      const deleteProcedure = async (id) => {
        if (!confirm('Delete this procedure and all its photos? This cannot be undone.')) return;
        await DB.deleteProcedure(id);
        enqueueFirebaseSync('delete_procedure', { id, patientId: patient.id }).catch(() => {});
        load();
      };

      const PROC_CATEGORY_STYLE = {
        dental: { bg: 'rgba(244,63,94,0.12)', border: 'rgba(244,63,94,0.3)', text: '#fb7185', accent: '#fb7185' },
        face:   { bg: 'rgba(99,102,241,0.12)', border: 'rgba(99,102,241,0.3)', text: '#a5b4fc', accent: '#a5b4fc' },
        both:   { bg: 'rgba(168,85,247,0.12)', border: 'rgba(168,85,247,0.3)', text: '#d8b4fe', accent: '#d8b4fe' },
      };

      /* Patient avatar gradient (same palette as list) */
      const AVATAR_GRAD2 = [
        ['#6366f1','#8b5cf6'], ['#0ea5e9','#6366f1'], ['#10b981','#059669'],
        ['#f59e0b','#ef4444'], ['#ec4899','#8b5cf6'], ['#14b8a6','#0ea5e9'],
        ['#f97316','#ec4899'], ['#84cc16','#14b8a6'],
      ];
      const [ac1, ac2] = AVATAR_GRAD2[patient.name.charCodeAt(0) % AVATAR_GRAD2.length];

      return (
        <div className="flex flex-col h-full" style={{background:'var(--pg-bg)'}}>

          {/* Header */}
          <div className="px-5 pt-safe pb-5"
            style={{background:'var(--pg-header)', borderBottom:'1px solid var(--pg-footer-bd)'}}>
            <button onClick={onBack}
              className="flex items-center gap-1.5 text-indigo-400 text-sm mb-4 active:opacity-70">
              <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M6 1L2 6l4 5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              All Patients
            </button>

            <div className="flex items-center gap-4">
              {/* Large avatar */}
              <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-bold text-xl flex-shrink-0"
                style={{background:`linear-gradient(135deg, ${ac1}, ${ac2})`, boxShadow:`0 4px 20px ${ac1}55`}}>
                {patient.name.charAt(0).toUpperCase()}
              </div>
              <div className="flex-1 min-w-0">
                <h1 className="text-white text-xl font-bold leading-tight truncate">{patient.name}</h1>
                <p className="text-white/40 text-xs mt-0.5">{patient.id}</p>
                {patient.dob && (
                  <p className="text-white/28 text-xs mt-0.5">
                    DOB: {new Date(patient.dob + 'T00:00:00').toLocaleDateString()}
                  </p>
                )}
              </div>
              <div className="rounded-xl px-3 py-1.5 flex-shrink-0 text-center"
                style={{background:'var(--pg-surface)', border:'1px solid var(--pg-border)'}}>
                <p className="text-white font-bold text-base leading-none">{procedures.length}</p>
                <p className="text-white/35 text-[10px] mt-0.5">visit{procedures.length !== 1 ? 's' : ''}</p>
              </div>
            </div>
          </div>

          {/* Procedures list */}
          <div className="flex-1 overflow-y-auto no-scroll px-4 py-4 space-y-2.5">
            {procedures.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-48 text-center gap-4">
                <div className="w-16 h-16 rounded-2xl flex items-center justify-center"
                  style={{background:'var(--pg-surface)', border:'1px solid var(--pg-border)', boxShadow:'var(--pg-card-shadow)'}}>
                  <span className="text-3xl">📋</span>
                </div>
                <div>
                  <p className="text-white/45 text-[15px] font-medium">No procedures yet</p>
                  <p className="text-white/25 text-sm mt-1">Add a procedure to start capturing photos</p>
                </div>
              </div>
            ) : (
              procedures.map(proc => {
                const cs = PROC_CATEGORY_STYLE[proc.category] || PROC_CATEGORY_STYLE.both;
                const count = photoCounts[proc.id] ?? 0;
                return (
                  <button key={proc.id} onClick={() => onOpenProcedure(proc)}
                    className="w-full rounded-2xl p-4 text-left active:scale-[0.98] transition-transform fade-in-up overflow-hidden relative"
                    style={{background:'var(--pg-surface)', border:'1px solid var(--pg-border)', boxShadow:'var(--pg-card-shadow)'}}>
                    {/* Left accent strip */}
                    <div className="absolute left-0 top-3 bottom-3 w-[3px] rounded-full"
                      style={{background:cs.accent}} />
                    <div className="pl-3 flex items-start justify-between">
                      <div className="flex-1 min-w-0">
                        <p className="text-white font-semibold text-[15px] leading-tight">{proc.name}</p>
                        <p className="text-white/40 text-xs mt-1">
                          {new Date(proc.date + 'T00:00:00').toLocaleDateString(undefined, { dateStyle: 'medium' })}
                        </p>
                        {proc.notes && (
                          <p className="text-white/25 text-xs mt-1 line-clamp-1">{proc.notes}</p>
                        )}
                      </div>
                      <div className="flex flex-col items-end gap-1.5 ml-3 flex-shrink-0">
                        <span className="text-[10px] px-2 py-0.5 rounded-full font-bold"
                          style={{background:cs.bg, border:`1px solid ${cs.border}`, color:cs.text}}>
                          {proc.category === 'both' ? 'Face+Dental' : proc.category.charAt(0).toUpperCase() + proc.category.slice(1)}
                        </span>
                        <span className="text-white/30 text-xs">{count} photo{count !== 1 ? 's' : ''}</span>
                      </div>
                    </div>
                    {/* Arrow */}
                    <div className="absolute right-4 top-1/2 -translate-y-1/2">
                      <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
                        <path d="M1 1l5 5-5 5" stroke="var(--pg-t4)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </div>
                  </button>
                );
              })
            )}
          </div>

          {/* Add Procedure button */}
          <div className="px-4 pb-safe pt-3" style={{borderTop:'1px solid var(--pg-footer-bd)'}}>
            <button onClick={() => setShowAddProc(true)}
              className="btn-primary w-full py-4 rounded-2xl text-white font-semibold text-[15px] transition-opacity">
              + New Procedure
            </button>
          </div>

          {showAddProc && (
            <AddProcedureModal
              patientId={patient.id}
              onAdd={handleAddProcedure}
              onClose={() => setShowAddProc(false)}
            />
          )}
        </div>
      );
    }

    /* ── 10c. ProcedureDetailView (photos within a procedure) ──── */
    function ProcedureDetailView({ patient, procedure, onBack, onStartCamera }) {
      const [photos,       setPhotos]       = useState([]);
      const [viewPhoto,    setViewPhoto]    = useState(null);
      const [filterMode,   setFilterMode]   = useState('all');
      const [filterType,   setFilterType]   = useState('all');

      const loadPhotos = useCallback(async () => {
        const list = await DB.getPhotosByProcedure(procedure.id);
        setPhotos(list.sort((a, b) => b.timestamp - a.timestamp));
      }, [procedure.id]);

      useEffect(() => { loadPhotos(); }, [loadPhotos]);

      const downloadPhoto = (photo) => {
        const src = photo.dataUrl || photo.downloadUrl;
        if (!src) return;
        const filename = [
          patient.name.replace(/\s+/g, '_'),
          procedure.name.replace(/\s+/g, '_'),
          photo.captureMode,
          photo.photoType,
          new Date(photo.timestamp).toISOString().split('T')[0],
        ].join('_') + '.jpg';
        if (photo.downloadUrl && !photo.dataUrl) {
          /* Remote photo — open in new tab (cross-origin download restriction) */
          window.open(photo.downloadUrl, '_blank');
        } else {
          const a = document.createElement('a');
          a.href = src; a.download = filename; a.click();
        }
      };

      const deletePhoto = async (id) => {
        if (!confirm('Delete this photo? This cannot be undone.')) return;
        await DB.deletePhoto(id);
        setViewPhoto(null);
        loadPhotos();
      };

      const filtered = photos.filter(p => {
        if (filterMode !== 'all' && p.captureMode !== filterMode) return false;
        if (filterType !== 'all' && p.photoType   !== filterType) return false;
        return true;
      });

      const grouped = filtered.reduce((acc, p) => {
        const d = new Date(p.timestamp).toLocaleDateString(undefined, { dateStyle: 'medium' });
        (acc[d] ??= []).push(p);
        return acc;
      }, {});

      /* Determine which capture modes to show based on procedure category */
      const availableModes = procedure.category === 'face' ? FACE_MODES
        : procedure.category === 'dental' ? DENTAL_MODES
        : Object.values(CAPTURE_MODES);

      const modeStatus = useMemo(() => {
        const s = {};
        for (const m of availableModes) {
          const mp = photos.filter(p => p.captureMode === m.id);
          s[m.id] = { hasPre: mp.some(p => p.photoType === 'pre'), hasPost: mp.some(p => p.photoType === 'post') };
        }
        return s;
      }, [photos, availableModes]);

      /* Group modes by category for display */
      const modeGroups = procedure.category === 'both'
        ? [{ label: 'Face', modes: FACE_MODES }, { label: 'Dental', modes: DENTAL_MODES }]
        : [{ label: procedure.category === 'face' ? 'Face' : 'Dental', modes: availableModes }];

      /* Mode color map for capture buttons */
      const MODE_COLOR = {
        front:'#6366f1', left:'#8b5cf6', right:'#10b981',
        teeth_front:'#f43f5e', upper_arch:'#0ea5e9', lower_arch:'#14b8a6',
        left_buccal:'#ec4899', right_buccal:'#f97316',
      };

      return (
        <div className="flex flex-col h-full" style={{background:'var(--pg-bg)'}}>

          {/* Header */}
          <div className="px-5 pt-safe pb-4"
            style={{background:'var(--pg-header)', borderBottom:'1px solid var(--pg-footer-bd)'}}>
            <button onClick={onBack}
              className="flex items-center gap-1.5 text-indigo-400 text-sm mb-4 active:opacity-70">
              <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M6 1L2 6l4 5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              {patient.name}
            </button>
            <div className="flex items-start justify-between">
              <div>
                <h1 className="text-white text-xl font-bold leading-tight">{procedure.name}</h1>
                <p className="text-white/40 text-[13px] mt-0.5">
                  {new Date(procedure.date + 'T00:00:00').toLocaleDateString(undefined, { dateStyle: 'medium' })}
                </p>
              </div>
              <div className="rounded-xl px-3 py-1.5 text-center flex-shrink-0 ml-3"
                style={{background:'var(--pg-surface)', border:'1px solid var(--pg-border)'}}>
                <p className="text-white font-bold text-base leading-none">{photos.length}</p>
                <p className="text-white/35 text-[10px] mt-0.5">photo{photos.length !== 1 ? 's' : ''}</p>
              </div>
            </div>
          </div>

          {/* Capture mode grid */}
          <div className="px-4 py-3 space-y-3"
            style={{background:'var(--pg-surface)', borderBottom:'1px solid var(--pg-footer-bd)'}}>
            {modeGroups.map(group => (
              <div key={group.label}>
                {modeGroups.length > 1 && (
                  <p className="section-label mb-2">{group.label}</p>
                )}
                <div className="grid grid-cols-4 gap-2">
                  {group.modes.map(mode => {
                    const st = modeStatus[mode.id] ?? {};
                    const mc = MODE_COLOR[mode.id] || '#6366f1';
                    const done = st.hasPre && st.hasPost;
                    return (
                      <button key={mode.id}
                        onClick={() => onStartCamera(mode.id, photos, procedure)}
                        className="rounded-xl p-2.5 text-center active:scale-95 transition-transform relative overflow-hidden"
                        style={{
                          background: done ? `${mc}18` : 'rgba(255,255,255,0.05)',
                          border: `1px solid ${done ? mc + '40' : 'rgba(255,255,255,0.09)'}`,
                        }}>
                        {done && (
                          <div className="absolute top-1 right-1 w-2 h-2 rounded-full"
                            style={{background: mc}} />
                        )}
                        <p className="text-white font-semibold text-[11px] leading-tight">{mode.abbr}</p>
                        <div className="flex justify-center gap-0.5 mt-1.5">
                          <span className={`w-1.5 h-1.5 rounded-full ${st.hasPre ? 'bg-emerald-400' : 'bg-white/12'}`} />
                          <span className={`w-1.5 h-1.5 rounded-full ${st.hasPost ? 'bg-amber-400' : 'bg-white/12'}`} />
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
            <div className="flex items-center gap-3 pt-0.5">
              <div className="flex items-center gap-1.5">
                <span className="w-2 h-2 rounded-full bg-emerald-400" />
                <span className="text-white/35 text-[10px]">PRE</span>
              </div>
              <div className="flex items-center gap-1.5">
                <span className="w-2 h-2 rounded-full bg-amber-400" />
                <span className="text-white/35 text-[10px]">POST</span>
              </div>
              <span className="text-white/20 text-[10px] ml-auto">Tap to capture</span>
            </div>
          </div>

          {/* Filter bar */}
          <div className="flex gap-2 px-4 py-2.5 overflow-x-auto no-scroll"
            style={{background:'var(--pg-surface)', borderBottom:'1px solid var(--pg-footer-bd)'}}>
            {['all', ...availableModes.map(m => m.id)].map(m => (
              <button key={m} onClick={() => setFilterMode(m)}
                className="px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap flex-shrink-0 transition-colors"
                style={filterMode === m
                  ? {background:'linear-gradient(135deg, var(--pg-accent-1), var(--pg-accent-2))', color:'white'}
                  : {background:'var(--pg-input)', color:'rgba(255,255,255,0.45)', border:'1px solid var(--pg-border)'}}>
                {m === 'all' ? 'All Views' : CAPTURE_MODES[m]?.abbr}
              </button>
            ))}
            <div className="w-px flex-shrink-0" style={{background:'var(--pg-border)'}} />
            {['all', 'pre', 'post'].map(t => (
              <button key={t} onClick={() => setFilterType(t)}
                className="px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap flex-shrink-0 transition-colors"
                style={filterType === t
                  ? {background: t === 'pre' ? 'rgba(52,211,153,0.25)' : t === 'post' ? 'rgba(251,191,36,0.25)' : 'rgba(139,92,246,0.25)',
                     color: t === 'pre' ? '#6ee7b7' : t === 'post' ? '#fde68a' : '#ddd6fe',
                     border: `1px solid ${t === 'pre' ? 'rgba(52,211,153,0.4)' : t === 'post' ? 'rgba(251,191,36,0.4)' : 'rgba(139,92,246,0.4)'}`}
                  : {background:'var(--pg-input)', color:'rgba(255,255,255,0.45)', border:'1px solid var(--pg-border)'}}>
                {t === 'all' ? 'All' : t === 'pre' ? 'Pre' : 'Post'}
              </button>
            ))}
          </div>

          {/* Photo grid */}
          <div className="flex-1 overflow-y-auto no-scroll px-4 py-4">
            {Object.entries(grouped).length === 0 ? (
              <div className="flex flex-col items-center justify-center h-44 text-center gap-4">
                <div className="w-14 h-14 rounded-2xl flex items-center justify-center"
                  style={{background:'var(--pg-surface)', border:'1px solid var(--pg-border)', boxShadow:'var(--pg-card-shadow)'}}>
                  <span className="text-3xl">📸</span>
                </div>
                <p className="text-white/38 text-sm">
                  {photos.length === 0 ? 'Tap a mode above to start capturing' : 'No photos match the current filter'}
                </p>
              </div>
            ) : (
              Object.entries(grouped).map(([date, group]) => (
                <div key={date} className="mb-6">
                  <h3 className="section-label mb-2.5">{date}</h3>
                  <div className="grid grid-cols-3 gap-2">
                    {group.map(photo => (
                      <button key={photo.id} onClick={() => setViewPhoto(photo)}
                        className="relative aspect-[3/4] rounded-xl overflow-hidden active:scale-95 transition-transform"
                        style={{border:'1px solid var(--pg-border)'}}>
                        <img src={photo.dataUrl || photo.downloadUrl} alt=""
                          className="w-full h-full object-cover" />
                        <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent px-2 py-1.5">
                          <div className="flex items-end justify-between">
                            <span className="text-white/80 text-[10px] font-bold leading-none">
                              {CAPTURE_MODES[photo.captureMode]?.abbr}
                            </span>
                            <span className={`text-[8px] font-extrabold px-1.5 py-0.5 rounded-full leading-none ${

    /* ── 13. SettingsView ─────────────────────────────────────────── */
    function SettingsView({ onBack }) {
      const [clientId,     setClientId]     = useState('');
      const [driveEnabled, setDriveEnabled] = useState(false);
      const [driveEmail,   setDriveEmail]   = useState('');
      const [pendingCount, setPendingCount] = useState(0);
      const [errorCount,   setErrorCount]   = useState(0);
      const [storageUsed,  setStorageUsed]  = useState(null);
      const [signingIn,    setSigningIn]    = useState(false);

      /* Theme */
      const [activeTheme, setActiveTheme] = useState(
        document.documentElement.dataset.theme || 'clean-bright'
      );

      /* Firebase sync status */
      const [fbSyncPending,  setFbSyncPending]  = useState(0);
      const [fbSyncErrors,   setFbSyncErrors]   = useState(0);
      const [fbInitialSync,  setFbInitialSync]  = useState(false);

      /* Admin user management */
      const [currentUserEmail, setCurrentUserEmail] = useState('');
      const [isAdmin,          setIsAdmin]          = useState(false);
      const [pendingUsers,     setPendingUsers]     = useState([]);
      const [allUsers,         setAllUsers]         = useState([]);

      const handleThemeChange = async (id) => {
        setActiveTheme(id);
        applyTheme(id);
        await DB.setSetting('theme', id);
      };

      const loadUsers = async () => {
        const fb = await getFirebase();
        if (!fb) return;
        const snap = await fb.db.collection('users').get();
        const users = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
        setPendingUsers(users.filter(u => u.status === 'pending'));
        setAllUsers(users);
      };

      useEffect(() => {
        (async () => {
          const auth = await getFirebaseAuth();
          const currentUser = auth?.currentUser;
          const email = currentUser?.email || '';
          setCurrentUserEmail(email);
          const admin = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
          setIsAdmin(admin);

          const cid = await DB.getSetting('googleClientId');
          const en  = await DB.getSetting('driveEnabled');
          const em  = await DB.getSetting('driveEmail');
          if (cid) setClientId(cid);
          if (en)  setDriveEnabled(true);
          if (em)  setDriveEmail(em);

          const pq = await DB.getUploadQueue('pending');
          const eq = await DB.getUploadQueue('error');
          setPendingCount(pq.length);
          setErrorCount(eq.length);

          const fbp = await DB.getFirebaseQueue('pending');
          const fbe = await DB.getFirebaseQueue('error');
          setFbSyncPending(fbp.length);
          setFbSyncErrors(fbe.length);

          if (navigator.storage?.estimate) {
            const est = await navigator.storage.estimate();
            setStorageUsed(est);
          }

          if (admin) await loadUsers();
        })();
      }, []);

      const handleApproveUser = async (uid) => {
        const fb = await getFirebase();
        if (!fb) return;
        await fb.db.collection('users').doc(uid).update({ status: 'approved' });
        await loadUsers();
      };

      const handleRejectUser = async (uid) => {
        if (!confirm('Reject this user? They will not be able to access the app.')) return;
        const fb = await getFirebase();
        if (!fb) return;
        await fb.db.collection('users').doc(uid).update({ status: 'rejected' });
        await loadUsers();
      };

      const handleRevokeUser = async (uid, email) => {
        if (!confirm(`Revoke access for ${email}?`)) return;
        const fb = await getFirebase();
        if (!fb) return;
        await fb.db.collection('users').doc(uid).update({ status: 'rejected' });
        await loadUsers();
      };

      const saveClientId = async () => {
        await DB.setSetting('googleClientId', clientId.trim());
      };

      const handleSignIn = async () => {
        if (!clientId.trim()) { alert('Please enter a Google Client ID first.'); return; }
        await saveClientId();
        setSigningIn(true);
        try {
          const token = await new Promise((resolve, reject) => {
            if (!window.google?.accounts?.oauth2) {
              reject(new Error('Google Identity Services not loaded. Check your internet connection.'));
              return;
            }
            const client = google.accounts.oauth2.initTokenModel({
              client_id: clientId.trim(),
              scope: 'https://www.googleapis.com/auth/drive.file',
              callback: (resp) => {
                if (resp.error) reject(new Error(resp.error_description || resp.error));
                else resolve(resp.access_token);
              },
            });
            client.requestAccessToken();
          });

          /* Get user email */
          const info = await fetch('https://www.googleapis.com/oauth2/v1/userinfo', {
            headers: { Authorization: `Bearer ${token}` },
          });
          const user = await info.json();

          await DB.setSetting('driveEnabled', true);
          await DB.setSetting('driveEmail', user.email || 'Connected');
          setDriveEnabled(true);
          setDriveEmail(user.email || 'Connected');
        } catch (err) {
          alert('Sign-in failed: ' + err.message);
        }
        setSigningIn(false);
      };

      const handleSignOut = async () => {
        await DB.setSetting('driveEnabled', false);
        await DB.setSetting('driveEmail', '');
        setDriveEnabled(false);
        setDriveEmail('');
      };

      const handleUploadNow = () => {
        processUploadQueue();
        alert('Upload started. Check back in a moment.');
      };

      /* ── Firebase handlers ── */
      const handleFirebaseSyncNow = () => {
        processFirebaseSyncQueue();
        alert('Firebase sync started.');
      };

      const handleInitialSync = async () => {
        if (!confirm('This will upload all local patients, procedures, and photos to Firebase. Continue?')) return;
        setFbInitialSync(true);
        try {
          const patients   = await DB.getPatients();
          const allProcs   = [];
          const allPhotos  = [];
          for (const p of patients) {
            await enqueueFirebaseSync('sync_patient', p);
            const procs = await DB.getProceduresByPatient(p.id);
            for (const pr of procs) {
              await enqueueFirebaseSync('sync_procedure', pr);
              const photos = await DB.getPhotosByProcedure(pr.id);
              for (const ph of photos) {
                await enqueueFirebaseSync('sync_photo', ph, ph.dataUrl);
              }
            }
          }
          alert(`Queued ${patients.length} patients for sync. Syncing in background…`);
          const fbp = await DB.getFirebaseQueue('pending');
          setFbSyncPending(fbp.length);
        } catch (err) {
          alert('Initial sync error: ' + err.message);
        }
        setFbInitialSync(false);
      };

      const handleLogout = async () => {
        if (!confirm('Sign out? You\'ll need to log back in to access PhotoGuide.')) return;
        try {
          const auth = await getFirebaseAuth();
          if (auth) await auth.signOut();
        } catch (err) {
          alert('Logout error: ' + err.message);
        }
      };

      const formatBytes = (bytes) => {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      };

      /* Helper: section card */
      const SCard = ({ children, accent }) => (
        <div className="rounded-2xl p-4 space-y-4"
          style={{background:'var(--pg-surface)', border:`1px solid ${accent || 'var(--pg-border)'}`}}>
          {children}
        </div>
      );

      const SSection = ({ icon, title, badge }) => (
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-base"
            style={{background:'var(--pg-surface-hi)'}}>
            {icon}
          </div>
          <span className="text-white font-semibold text-[15px]">{title}</span>
          {badge && <span className="ml-auto">{badge}</span>}
        </div>
      );

      return (
        <div className="flex flex-col h-full" style={{background:'var(--pg-bg)'}}>

          {/* Header */}
          <div className="px-5 pt-safe pb-4"
            style={{background:'var(--pg-header)', borderBottom:'1px solid var(--pg-footer-bd)'}}>
            <button onClick={onBack}
              className="flex items-center gap-1.5 text-indigo-400 text-sm mb-4 active:opacity-70">
              <svg width="7" height="12" viewBox="0 0 7 12" fill="none">
                <path d="M6 1L2 6l4 5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              Back
            </button>
            <h1 className="text-white text-xl font-bold">Settings</h1>
          </div>

          <div className="flex-1 overflow-y-auto no-scroll px-4 py-5 space-y-4">

            {/* ── Theme Picker ── */}
            <SCard>
              <SSection icon="🎨" title="Appearance" />
              <div className="space-y-2.5">
                {THEMES_CONFIG.map(t => {
                  const isActive = activeTheme === t.id;
                  const p = t.preview;
                  return (
                    <button key={t.id} onClick={() => handleThemeChange(t.id)}
                      className="w-full flex items-center gap-3.5 rounded-2xl p-3.5 active:scale-[0.98] transition-transform text-left"
                      style={{
                        border:     isActive ? `2px solid ${p.accent}` : '1px solid var(--pg-border)',
                        background: isActive ? `${p.accent}12` : 'var(--pg-surface)',
                        boxShadow:  isActive ? `0 0 0 3px ${p.accent}22` : 'var(--pg-card-shadow)',
                      }}>
                      {/* Mini screen preview */}
                      <div className="w-14 h-10 rounded-xl overflow-hidden flex-shrink-0 relative"
                        style={{background: p.bg, border:`1px solid ${p.accent}25`}}>
                        {/* Simulated header bar */}
                        <div className="absolute top-0 left-0 right-0 h-3 flex items-center px-1.5 gap-1"
                          style={{background: p.surface, borderBottom:`1px solid ${p.accent}20`}}>
                          <div className="h-1 w-3 rounded-sm" style={{background:p.accent, opacity:0.7}} />
                          <div className="h-1 flex-1 rounded-sm" style={{background:p.accent, opacity:0.15}} />
                        </div>
                        {/* Simulated card rows */}
                        <div className="absolute top-4 left-1 right-1 space-y-0.5">

    /* ── 13b. LoginScreen ──────────────────────────────────────────── */
    function LoginScreen() {
      const [email,      setEmail]      = useState('');
      const [password,   setPassword]   = useState('');
      const [isRegister, setIsRegister] = useState(false);
      const [loading,    setLoading]    = useState(false);
      const [error,      setError]      = useState('');

      const handleAuth = async (e) => {
        e.preventDefault();
        if (!email || !password) { setError('Please enter email and password'); return; }
        setError('');
        setLoading(true);
        try {
          const auth = await getFirebaseAuth();
          if (!auth) throw new Error('Auth not available');

          if (isRegister) {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            /* Write user record — admin is auto-approved, everyone else is pending */
            const fb = await getFirebase();
            if (fb) {
              const isAdmin = email.trim().toLowerCase() === ADMIN_EMAIL.toLowerCase();
              await fb.db.collection('users').doc(cred.user.uid).set({
                email:     email.trim().toLowerCase(),
                status:    isAdmin ? 'approved' : 'pending',
                role:      isAdmin ? 'admin' : 'staff',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              });
            }
          } else {
            await auth.signInWithEmailAndPassword(email, password);
          }
        } catch (err) {
          const msg = err.message || String(err);
          if (msg.includes('already-in-use'))  setError('Email already registered. Sign in instead.');
          else if (msg.includes('user-not-found') || msg.includes('no user')) setError('Email not found. Register first.');
          else if (msg.includes('wrong-password') || msg.includes('invalid-credential')) setError('Incorrect password.');
          else setError(msg.slice(0, 80));
        }
        setLoading(false);
      };

      return (
        <div className="h-full flex flex-col items-center justify-center relative overflow-hidden px-5"
          style={{background: 'radial-gradient(ellipse at 25% 15%, var(--pg-accent-glow) 0%, transparent 55%), radial-gradient(ellipse at 75% 85%, rgba(139,92,246,0.10) 0%, transparent 55%), var(--pg-bg)'}}>

          {/* Ambient glow blobs */}
          <div className="absolute -top-40 -left-24 w-96 h-96 rounded-full pointer-events-none"
            style={{background: 'var(--pg-accent-glow)', filter: 'blur(60px)'}} />
          <div className="absolute -bottom-40 -right-24 w-96 h-96 rounded-full pointer-events-none"
            style={{background: 'var(--pg-accent-glow)', filter: 'blur(60px)'}} />

          <div className="w-full max-w-sm relative z-10 space-y-7">

            {/* Logo mark + wordmark */}
            <div className="text-center space-y-4">
              <div className="w-20 h-20 rounded-[1.4rem] mx-auto flex items-center justify-center"
                style={{background: 'linear-gradient(145deg, var(--pg-accent-1), var(--pg-accent-2))', boxShadow: '0 0 0 1px rgba(255,255,255,0.12), 0 8px 40px var(--pg-accent-glow)'}}>
                <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
                  <circle cx="19" cy="19" r="10" stroke="white" strokeWidth="2" fill="none" strokeOpacity="0.9"/>
                  <circle cx="19" cy="19" r="3.5" fill="white"/>
                  <line x1="19" y1="7" x2="19" y2="31" stroke="white" strokeWidth="1.5" strokeOpacity="0.3" strokeLinecap="round"/>
                  <line x1="7"  y1="19" x2="31" y2="19" stroke="white" strokeWidth="1.5" strokeOpacity="0.3" strokeLinecap="round"/>
                  <circle cx="29" cy="10" r="2.5" fill="white" fillOpacity="0.85"/>
                  <circle cx="29" cy="10" r="1" fill="white"/>
                </svg>
              </div>
              <div>
                <h1 className="text-white text-3xl font-bold tracking-tight">PhotoGuide</h1>
                <p className="text-white/35 text-[13px] mt-1 tracking-wide">Clinical Photography System</p>
              </div>
            </div>

            {/* Auth card */}
            <div className="rounded-2xl p-6 space-y-5"
              style={{background: 'var(--pg-surface)', border: '1px solid var(--pg-border)', backdropFilter: 'blur(20px)'}}>

              <p className="text-white/60 text-sm font-medium">
                {isRegister ? 'Create your account' : 'Welcome back'}
              </p>

              <form onSubmit={handleAuth} className="space-y-3.5">
                <div className="space-y-1.5">
                  <label className="section-label">Email address</label>
                  <input
                    type="email" value={email}
                    onChange={e => setEmail(e.target.value)}
                    placeholder="you@clinic.com"
                    className="field-input w-full rounded-xl px-4 py-3 text-white placeholder-white/25 text-sm transition-all"
                    style={{background: 'var(--pg-input)', border: '1px solid var(--pg-input-bd)'}}
                  />
                </div>
                <div className="space-y-1.5">
                  <label className="section-label">Password</label>
                  <input
                    type="password" value={password}
                    onChange={e => setPassword(e.target.value)}
                    placeholder="••••••••"
                    className="field-input w-full rounded-xl px-4 py-3 text-white placeholder-white/25 text-sm transition-all"
                    style={{background: 'var(--pg-input)', border: '1px solid var(--pg-input-bd)'}}
                  />
                </div>

                {error && (
                  <div className="flex gap-2 items-start rounded-xl px-3.5 py-2.5"
                    style={{background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.25)'}}>
                    <span className="text-red-400 text-xs leading-5">{error}</span>
                  </div>
                )}

                <button type="submit" disabled={loading}
                  className="btn-primary w-full py-3.5 rounded-xl text-white font-semibold text-sm disabled:opacity-50 transition-opacity"
                >
                  {loading ? (isRegister ? 'Creating account…' : 'Signing in…') : (isRegister ? 'Create Account' : 'Sign In')}
                </button>
              </form>

              <div className="text-center">
                <span className="text-white/30 text-xs">
                  {isRegister ? 'Already have an account? ' : 'New to PhotoGuide? '}
                </span>
                <button
                  onClick={() => { setIsRegister(!isRegister); setError(''); }}
                  className="text-indigo-400 text-xs font-semibold"
                >
                  {isRegister ? 'Sign in' : 'Register'}
                </button>
              </div>
            </div>

            {/* Footer note */}
            <p className="text-center text-white/22 text-[11px] leading-relaxed px-2">
              {isRegister
                ? 'New accounts require approval from the clinic administrator before access is granted.'
                : 'Access restricted to approved clinic staff · Secured by Firebase Auth'}
            </p>
          </div>
        </div>
      );
    }

    /* ── 14. App ───────────────────────────────────────────────────── */
    function App({ refreshRef }) {
      const [view,              setView]              = useState('patients');
      const [patients,          setPatients]          = useState([]);
      const [activePatient,     setActivePatient]     = useState(null);
      const [activeProcedure,   setActiveProcedure]   = useState(null);
      const [showAddPatient,    setShowAddPatient]    = useState(false);

      /* Camera flow state */
      const [cameraMode,     setCameraMode]     = useState('front');
      const [photoType,      setPhotoType]      = useState('pre');
      const [ghostImageUrl,  setGhostImageUrl]  = useState(null);
      const [patientPhotos,  setPatientPhotos]  = useState([]);
      const [showTypeModal,  setShowTypeModal]  = useState(false);
      const [showGhostSel,   setShowGhostSel]   = useState(false);

      /* PWA install */
      const [installPrompt,  setInstallPrompt]  = useState(null);
      const [showInstall,    setShowInstall]     = useState(false);

      /* ── Load patients from IndexedDB ── */
      const loadPatients = useCallback(async () => {
        const list = await DB.getPatients();
        setPatients(list.sort((a, b) => a.name.localeCompare(b.name)));
      }, []);

      useEffect(() => { loadPatients(); }, [loadPatients]);

      /* ── Expose loadPatients to AppContainer (called after initial sync) ── */
      useEffect(() => {
        if (refreshRef) refreshRef.current = loadPatients;
      }, [refreshRef, loadPatients]);

      /* ── Real-time Firestore → IndexedDB → UI listener ── */
      useEffect(() => {
        let unsub = null;
        (async () => {
          const fb = await getFirebase();
          if (!fb) return;
          unsub = fb.db.collection('patients').onSnapshot(async (snap) => {
            for (const change of snap.docChanges()) {
              if (change.type === 'added' || change.type === 'modified') {
                const d = change.doc.data();
                await DB.savePatient({
                  id: change.doc.id, ...d,
                  createdAt: d.createdAt?.toMillis?.() || d.createdAt || Date.now(),
                });
              } else if (change.type === 'removed') {
                /* patient deleted elsewhere — remove locally */
                try { await DB.deletePatient(change.doc.id); } catch (_) {}
              }
            }
            loadPatients();
          }, () => { /* ignore snapshot errors (offline) */ });
        })();
        return () => unsub?.();
      }, [loadPatients]);

      /* ── Service worker registration ── */
      useEffect(() => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
      }, []);

      /* ── PWA install prompt ── */
      useEffect(() => {
        const handler = (e) => {
          e.preventDefault();
          setInstallPrompt(e);
          setTimeout(() => setShowInstall(true), 4000);
        };
        window.addEventListener('beforeinstallprompt', handler);

        /* iOS: show hint after delay if not in standalone */
        const iOS       = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const standalone = window.matchMedia('(display-mode: standalone)').matches;
        if (iOS && !standalone) setTimeout(() => setShowInstall(true), 6000);

        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      /* ── Handlers ── */
      const handleAddPatient = async (data) => {
        await DB.savePatient(data);
        enqueueFirebaseSync('sync_patient', data).catch(() => {});
        await loadPatients();
        setShowAddPatient(false);
      };

      /*
       * Camera launch flow:
       *   1. User taps a capture-mode button in PatientDetailView.
       *   2. Modal asks PRE or POST.
       *   3. If POST → GhostSelector.
       *   4. Camera opens.
       */
      const handleStartCamera = useCallback((mode, photos, procedure) => {
        setCameraMode(mode);
        setPatientPhotos(photos ?? []);
        if (procedure) setActiveProcedure(procedure);
        setShowTypeModal(true);
      }, []);

      const handleTypeChosen = (type) => {
        setPhotoType(type);
        setShowTypeModal(false);
        if (type === 'post') {
          setShowGhostSel(true);
        } else {
          setGhostImageUrl(null);
          setView('camera');
        }
      };

      const handleGhostChosen = (photo) => {
        setGhostImageUrl(photo.dataUrl || photo.downloadUrl);
        setShowGhostSel(false);
        setView('camera');
      };

      const handleGhostSkip = () => {
        setGhostImageUrl(null);
        setShowGhostSel(false);
        setView('camera');
      };

      /*
       * After capture:
       *   • Save to IndexedDB.
       *   • Offer device download (File System Access API or <a download> fallback).
       *   • Return to patient detail.
       */
      const handleCapture = useCallback(async (photoData, blob) => {
        const photoRecord = {
          ...photoData,
          patientId:   activePatient.id,
          procedureId: activeProcedure?.id ?? null,
        };

        /* 1. Store in IndexedDB */
        const photoId = await DB.savePhoto(photoRecord);

        /* 2. Save to device gallery / downloads */
        const nameParts = [activePatient.name.replace(/\s+/g, '_')];
        if (activeProcedure) nameParts.push(activeProcedure.name.replace(/\s+/g, '_'));
        nameParts.push(photoData.captureMode, photoData.photoType, new Date(photoData.timestamp).toISOString().split('T')[0]);
        const filename = nameParts.join('_') + '.jpg';

        try {
          if ('showSaveFilePicker' in window) {
            const fh = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [{ description: 'JPEG Image', accept: { 'image/jpeg': ['.jpg'] } }],
            }).catch(() => null);
            if (fh) {
              const writable = await fh.createWritable();
              await writable.write(blob);
              await writable.close();
            } else {
              triggerDownload(blob, filename);
            }
          } else {
            triggerDownload(blob, filename);
          }
        } catch (_) {
          triggerDownload(blob, filename);
        }

        /* 3. Queue Google Drive upload if enabled */
        try {
          const driveEnabled = await DB.getSetting('driveEnabled');
          if (driveEnabled) {
            await DB.addToUploadQueue({
              photoId:       photoId,
              patientName:   activePatient.name,
              procedureName: activeProcedure?.name || 'General',
              filename,
              dataUrl:       photoData.dataUrl,
              status:        'pending',
              retries:       0,
              createdAt:     Date.now(),
            });
            processUploadQueue();
            if (navigator.serviceWorker?.ready) {
              navigator.serviceWorker.ready.then(reg => reg.sync?.register('sync-photos')).catch(() => {});
            }
          }
        } catch (_) {}

        /* 4. Queue Firebase sync */
        try {
          await enqueueFirebaseSync('sync_photo', { ...photoRecord, id: photoId }, photoData.dataUrl);
        } catch (_) {}

        /* 5. Return to detail view */
        setTimeout(() => setView(activeProcedure ? 'procedure-detail' : 'patient-detail'), 350);
      }, [activePatient, activeProcedure]);

      const triggerDownload = (blob, filename) => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      /* ── Render ── */
      return (
        <div className="h-full flex flex-col overflow-hidden">

          {/* PRE / POST modal */}
          {showTypeModal && (
            <div className="fixed inset-0 z-50 flex items-end"
              style={{background:'var(--pg-overlay)', backdropFilter:'blur(8px)'}}>
              <div className="w-full rounded-t-3xl px-5 pt-4 pb-safe slide-up"
                style={{background:'var(--pg-modal)', border:'1px solid var(--pg-border-hi)', borderBottom:'none'}}>
                <div className="drag-handle" />
                <h2 className="text-white text-[18px] font-bold mb-1">{CAPTURE_MODES[cameraMode]?.label}</h2>
                <p className="text-white/40 text-sm mb-5">Is this photo before or after treatment?</p>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => handleTypeChosen('pre')}
                    className="py-6 rounded-2xl text-white font-bold text-lg flex flex-col items-center gap-2 active:scale-95 transition-transform"
                    style={{background:'rgba(52,211,153,0.15)', border:'1px solid rgba(52,211,153,0.4)'}}>
                    <span className="text-2xl">📸</span>
                    <span className="text-emerald-300 font-bold">PRE</span>
                    <span className="text-white/40 text-xs font-normal">Before treatment</span>
                  </button>
                  <button onClick={() => handleTypeChosen('post')}
                    className="py-6 rounded-2xl text-white font-bold text-lg flex flex-col items-center gap-2 active:scale-95 transition-transform"
                    style={{background:'rgba(251,191,36,0.15)', border:'1px solid rgba(251,191,36,0.4)'}}>
                    <span className="text-2xl">✨</span>
                    <span className="text-amber-300 font-bold">POST</span>
                    <span className="text-white/40 text-xs font-normal">After treatment</span>
                  </button>
                </div>
                <button onClick={() => setShowTypeModal(false)}
                  className="mt-3 mb-2 w-full py-3.5 rounded-xl text-white/55 font-medium active:scale-[0.98] btn-secondary">
                  Cancel
                </button>
              </div>
            </div>
          )}

          {/* Ghost selector */}
          {showGhostSel && (
            <GhostSelector
              photos={patientPhotos}
              captureMode={cameraMode}
              onSelect={handleGhostChosen}
              onSkip={handleGhostSkip}
            />
          )}

          {/* Camera */}
          {view === 'camera' && (
            <CameraOverlay
              captureMode={cameraMode}
              photoType={photoType}
              ghostImageUrl={ghostImageUrl}
              onCapture={handleCapture}
              onClose={() => setView(activeProcedure ? 'procedure-detail' : 'patient-detail')}
              patientName={activePatient?.name}
            />
          )}

          {/* Settings */}
          {view === 'settings' && (
            <SettingsView onBack={() => setView('patients')} />
          )}

          {/* Patient list */}
          {view === 'patients' && (
            <PatientListView
              patients={patients}
              onSelect={(p) => { setActivePatient(p); setView('patient-detail'); }}
              onAdd={() => setShowAddPatient(true)}
              onSettings={() => setView('settings')}
            />
          )}

          {/* Patient detail (procedures list) */}
          {view === 'patient-detail' && activePatient && (
            <PatientDetailView
              patient={activePatient}
              onBack={() => { setView('patients'); loadPatients(); }}
              onOpenProcedure={(proc) => { setActiveProcedure(proc); setView('procedure-detail'); }}
            />
          )}

          {/* Procedure detail (photos) */}
          {view === 'procedure-detail' && activePatient && activeProcedure && (
            <ProcedureDetailView
              patient={activePatient}
              procedure={activeProcedure}
              onBack={() => { setActiveProcedure(null); setView('patient-detail'); }}
              onStartCamera={handleStartCamera}
            />
          )}

          {/* Add patient modal */}
          {showAddPatient && (
            <AddPatientModal
              onAdd={handleAddPatient}
              onClose={() => setShowAddPatient(false)}
            />
          )}

          {/* Install banner */}
          {showInstall && (
            <InstallBanner
              deferredPrompt={installPrompt}
              onDismiss={() => setShowInstall(false)}
            />
          )}
        </div>
      );
    }

    /* ── 15. AppContainer (Auth State) ────────────────────────────── */
    function AppContainer() {
      const [user,        setUser]        = useState(null);
      const [userStatus,  setUserStatus]  = useState(null); // 'approved'|'pending'|'rejected'|null
      const [authLoading, setAuthLoading] = useState(true);
      const [syncStep,    setSyncStep]    = useState('');  // '' | 'patients' | 'procedures' | 'photos' | 'done'
      const refreshRef = useRef(null); // callback set by <App> to reload its patients list

      const checkUserStatus = async (firebaseUser) => {
        if (!firebaseUser) { setUser(null); setUserStatus(null); setAuthLoading(false); return; }
        try {
          const fb = await getFirebase();
          if (!fb) { setUser(firebaseUser); setUserStatus('approved'); setAuthLoading(false); return; }
          const doc = await fb.db.collection('users').doc(firebaseUser.uid).get();
          if (!doc.exists) {
            const isAdmin = firebaseUser.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
            const status  = isAdmin ? 'approved' : 'pending';
            await fb.db.collection('users').doc(firebaseUser.uid).set({
              email: firebaseUser.email, status, role: isAdmin ? 'admin' : 'staff',
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
            setUserStatus(status);
          } else {
            setUserStatus(doc.data().status || 'pending');
          }
          setUser(firebaseUser);
        } catch (err) {
          console.error('Status check error:', err);
          setUser(firebaseUser);
          setUserStatus('approved');
        }
        setAuthLoading(false);
      };

      /* Pull Firestore → IndexedDB on login, then trigger App refresh */
      useEffect(() => {
        if (userStatus !== 'approved' || !user) return;
        setSyncStep('patients');
        syncFromFirebase((step) => {
          setSyncStep(step);
          if (step === 'done') refreshRef.current?.();
        });
      }, [userStatus, user?.uid]);

      /* Load saved theme on mount (default: clean-bright) */
      useEffect(() => {
        DB.getSetting('theme').then(t => applyTheme(t || 'clean-bright'));
      }, []);

      useEffect(() => {
        (async () => {
          try {
            const auth = await getFirebaseAuth();
            if (!auth) { setAuthLoading(false); return; }
            auth.onAuthStateChanged(checkUserStatus);
          } catch (err) {
            console.error('Auth init error:', err);
            setAuthLoading(false);
          }
        })();
      }, []);

      const syncLabel = { patients: 'patients', procedures: 'visits', photos: 'photos', done: '' }[syncStep] || '';

      if (authLoading || (userStatus === 'approved' && syncStep && syncStep !== 'done')) {
        return (
          <div className="h-full flex items-center justify-center"
            style={{background:'radial-gradient(ellipse at 30% 30%, var(--pg-accent-glow) 0%, transparent 55%), var(--pg-bg)'}}>
            <div className="text-center space-y-4">
              {/* Branded spinner */}
              <div className="relative w-14 h-14 mx-auto">
                <div className="absolute inset-0 rounded-full border-2 border-white/6" />
                <div className="absolute inset-0 rounded-full border-2 border-t-indigo-500 border-r-transparent border-b-transparent border-l-transparent animate-spin" />
                <div className="absolute inset-2 rounded-full flex items-center justify-center"
                  style={{background:'var(--pg-accent-glow)'}}>
                  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <circle cx="9" cy="9" r="5" stroke="rgba(165,180,252,0.7)" strokeWidth="1.5" fill="none"/>
                    <circle cx="9" cy="9" r="2" fill="rgba(165,180,252,0.8)"/>
                  </svg>
                </div>
              </div>
              <p className="text-white/40 text-sm">
                {authLoading ? 'Loading PhotoGuide…' : `Syncing ${syncLabel}…`}
              </p>
            </div>
          </div>
        );
      }

      if (!user) return <LoginScreen />;

      if (userStatus === 'pending') {
        return (
          <div className="h-full flex flex-col items-center justify-center px-6 text-center"
            style={{background:'radial-gradient(ellipse at 50% 40%, rgba(251,191,36,0.08) 0%, transparent 60%), var(--pg-bg)'}}>
            <div className="space-y-6">
              <div className="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto text-3xl"
                style={{background:'rgba(251,191,36,0.1)', border:'1px solid rgba(251,191,36,0.25)', boxShadow:'0 0 40px rgba(251,191,36,0.1)'}}>
                ⏳
              </div>
              <div className="space-y-2">
                <h2 className="text-white text-xl font-bold">Awaiting Approval</h2>
                <p className="text-white/45 text-sm leading-relaxed max-w-xs mx-auto">
                  Your account is pending approval from the clinic administrator. You'll be notified once access is granted.
                </p>
                <p className="text-white/25 text-xs mt-2">{user.email}</p>
              </div>
              <button
                onClick={async () => { const a = await getFirebaseAuth(); a?.signOut(); }}
                className="px-6 py-2.5 rounded-xl text-sm font-medium active:scale-95 transition-transform btn-secondary">
                Sign Out
              </button>
            </div>
          </div>
        );
      }

      if (userStatus === 'rejected') {
        return (
          <div className="h-full flex flex-col items-center justify-center px-6 text-center"
            style={{background:'radial-gradient(ellipse at 50% 40%, rgba(239,68,68,0.07) 0%, transparent 60%), var(--pg-bg)'}}>
            <div className="space-y-6">
              <div className="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto text-3xl"
                style={{background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.25)', boxShadow:'0 0 40px rgba(239,68,68,0.08)'}}>
                🚫
              </div>
              <div className="space-y-2">
                <h2 className="text-white text-xl font-bold">Access Denied</h2>
                <p className="text-white/45 text-sm leading-relaxed max-w-xs mx-auto">
                  Your account has not been approved. Please contact the clinic administrator for access.
                </p>
              </div>
              <button
                onClick={async () => { const a = await getFirebaseAuth(); a?.signOut(); }}
                className="px-6 py-2.5 rounded-xl text-sm font-medium active:scale-95 transition-transform btn-secondary">
                Sign Out
              </button>
            </div>
          </div>
        );
      }

      return <App refreshRef={refreshRef} />;
    }

    /* ── Mount ─────────────────────────────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(<AppContainer />);
  </script>
</body>
</html>
