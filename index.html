  <style>
    /* ═══════════════════════════════════════════════
       THEME CSS VARIABLES
       ─────────────────────────────────────────────
       data-theme="clean-bright" (default)
         White & Blue — clinical photography
       data-theme="dark-blue"
         Black & Bright Blue — X-rays / dark rooms
       data-theme="calm-modern"
         Light Grey & Soft Green — patient galleries
    ═══════════════════════════════════════════════ */

    /* ─────────────────────────────────────────────
       ☀️  Clean & Bright  (White & Blue) — default
       White backgrounds preserve true photo colour.
       Trustworthy clinical blue accent.
    ───────────────────────────────────────────── */
    :root {
      --pg-accent-1:    #2563eb;
      --pg-accent-2:    #3b82f6;
      --pg-accent-glow: rgba(37,99,235,0.20);
      --pg-accent-ring: rgba(37,99,235,0.15);
      --pg-bg:          #f4f8ff;
      --pg-surface:     #ffffff;
      --pg-surface-hi:  rgba(37,99,235,0.04);
      --pg-border:      rgba(37,99,235,0.13);
      --pg-border-hi:   rgba(37,99,235,0.22);
      --pg-text:        #0f172a;
      --pg-t2:          rgba(15,23,42,0.57);
      --pg-t3:          rgba(15,23,42,0.37);
      --pg-t4:          rgba(15,23,42,0.20);
      --pg-header:      linear-gradient(180deg, rgba(37,99,235,0.07) 0%, rgba(37,99,235,0.02) 100%), #ffffff;
      --pg-input:       rgba(37,99,235,0.04);
      --pg-input-bd:    rgba(37,99,235,0.16);
      --pg-modal:       #f8fbff;
      --pg-drag:        rgba(37,99,235,0.15);
      --pg-overlay:     rgba(15,23,42,0.50);
      --pg-footer-bd:   rgba(37,99,235,0.11);
      --pg-card-shadow: 0 1px 3px rgba(37,99,235,0.08), 0 4px 14px rgba(37,99,235,0.05);
      --pg-meta:        #ffffff;
      --pg-spinner-bd:  rgba(37,99,235,0.10);
    }

    /* ─────────────────────────────────────────────
       🌑  Dark Mode  (Black & Bright Blue)
       Near-black bg for high-contrast X-ray viewing.
       Bright sky-blue accent is easy to find.
    ───────────────────────────────────────────── */
    [data-theme="dark-blue"] {
      --pg-accent-1:    #0ea5e9;
      --pg-accent-2:    #38bdf8;
      --pg-accent-glow: rgba(14,165,233,0.32);
      --pg-accent-ring: rgba(14,165,233,0.20);
      --pg-bg:          #040810;
      --pg-surface:     rgba(255,255,255,0.05);
      --pg-surface-hi:  rgba(14,165,233,0.08);
      --pg-border:      rgba(14,165,233,0.14);
      --pg-border-hi:   rgba(14,165,233,0.25);
      --pg-text:        #f0f9ff;
      --pg-t2:          rgba(240,249,255,0.58);
      --pg-t3:          rgba(240,249,255,0.34);
      --pg-t4:          rgba(240,249,255,0.18);
      --pg-header:      linear-gradient(180deg, rgba(14,165,233,0.12) 0%, rgba(14,165,233,0.03) 100%), rgba(255,255,255,0.02);
      --pg-input:       rgba(14,165,233,0.07);
      --pg-input-bd:    rgba(14,165,233,0.22);
      --pg-modal:       #060c18;
      --pg-drag:        rgba(14,165,233,0.22);
      --pg-overlay:     rgba(0,0,0,0.82);
      --pg-footer-bd:   rgba(14,165,233,0.10);
      --pg-card-shadow: none;
      --pg-meta:        #040810;
      --pg-spinner-bd:  rgba(14,165,233,0.10);
    }

    /* ─────────────────────────────────────────────
       🌿  Calm & Modern  (Light Grey & Soft Green)
       Relaxed, organised feel for daily patient logs.
       Soft green conveys health without clinical sterility.
    ───────────────────────────────────────────── */
    [data-theme="calm-modern"] {
      --pg-accent-1:    #059669;
      --pg-accent-2:    #10b981;
      --pg-accent-glow: rgba(5,150,105,0.18);
      --pg-accent-ring: rgba(5,150,105,0.15);
      --pg-bg:          #eef2ee;
      --pg-surface:     #ffffff;
      --pg-surface-hi:  rgba(5,150,105,0.05);
      --pg-border:      rgba(5,150,105,0.13);
      --pg-border-hi:   rgba(5,150,105,0.22);
      --pg-text:        #0d1f15;
      --pg-t2:          rgba(13,31,21,0.57);
      --pg-t3:          rgba(13,31,21,0.37);
      --pg-t4:          rgba(13,31,21,0.20);
      --pg-header:      linear-gradient(180deg, rgba(5,150,105,0.07) 0%, rgba(5,150,105,0.02) 100%), #ffffff;
      --pg-input:       rgba(5,150,105,0.04);
      --pg-input-bd:    rgba(5,150,105,0.16);
      --pg-modal:       #f5f9f5;
      --pg-drag:        rgba(5,150,105,0.15);
      --pg-overlay:     rgba(13,31,21,0.50);
      --pg-footer-bd:   rgba(5,150,105,0.10);
      --pg-card-shadow: 0 1px 3px rgba(5,150,105,0.07), 0 4px 14px rgba(5,150,105,0.04);
      --pg-meta:        #ffffff;
      --pg-spinner-bd:  rgba(5,150,105,0.10);
    }

    /* ── Accent-colour overrides for links & badges ──
       text-indigo-* / text-violet-* adapt to each theme.
    ──────────────────────────────────────────────── */
    [data-theme="dark-blue"]   .text-indigo-400,
    [data-theme="dark-blue"]   .text-indigo-300 { color: #38bdf8; }
    [data-theme="calm-modern"] .text-indigo-400,
    [data-theme="calm-modern"] .text-indigo-300 { color: #059669; }
    [data-theme="clean-bright"] .text-indigo-400,
    [data-theme="clean-bright"] .text-indigo-300 { color: #2563eb; }

    /* ── Theme-aware text overrides ──────────────
       Overrides Tailwind's text-white / opacity
       variants for themed views. Camera overlay
       (.dark-layer) is excluded via its own rules.
    ─────────────────────────────────────────────── */
    [data-theme] .text-white                    { color: var(--pg-text); }
    [data-theme] .text-white\/80                { color: var(--pg-t2);   }
    [data-theme] .text-white\/70                { color: var(--pg-t2);   }
    [data-theme] .text-white\/65                { color: var(--pg-t2);   }
    [data-theme] .text-white\/60                { color: var(--pg-t2);   }
    [data-theme] .text-white\/55                { color: var(--pg-t2);   }
    [data-theme] .text-white\/50                { color: var(--pg-t2);   }
    [data-theme] .text-white\/45                { color: var(--pg-t2);   }
    [data-theme] .text-white\/40                { color: var(--pg-t2);   }
    [data-theme] .text-white\/38                { color: var(--pg-t3);   }
    [data-theme] .text-white\/35                { color: var(--pg-t3);   }
    [data-theme] .text-white\/30                { color: var(--pg-t3);   }
    [data-theme] .text-white\/28                { color: var(--pg-t3);   }
    [data-theme] .text-white\/25                { color: var(--pg-t3);   }
    [data-theme] .text-white\/22                { color: var(--pg-t4);   }
    [data-theme] .text-white\/20                { color: var(--pg-t4);   }
    [data-theme] .text-white\/18                { color: var(--pg-t4);   }

    /* Theme-aware placeholder colors */
    [data-theme] .placeholder-white\/25::placeholder,
    [data-theme] .placeholder-white\/30::placeholder,
    [data-theme] .placeholder-white\/40::placeholder { color: var(--pg-t3); }

    /* Theme-aware bg-white/* classes (subtle surfaces) */
    [data-theme] .bg-white\/6  { background-color: var(--pg-surface-hi) !important; }
    [data-theme] .bg-white\/8  { background-color: var(--pg-surface-hi) !important; }
    [data-theme] .bg-white\/10 { background-color: var(--pg-surface-hi) !important; }
    [data-theme] .bg-white\/12 { background-color: var(--pg-border) !important; }
    [data-theme] .bg-white\/15 { background-color: var(--pg-surface-hi) !important; }
    /* border-white/* classes */
    [data-theme] .border-white\/8  { border-color: var(--pg-border) !important; }
    [data-theme] .border-white\/10 { border-color: var(--pg-border) !important; }
    [data-theme] .border-white\/12 { border-color: var(--pg-border) !important; }
    [data-theme] .border-white\/15 { border-color: var(--pg-border-hi) !important; }
    [data-theme] .border-white\/20 { border-color: var(--pg-border-hi) !important; }

    /* Restore dark-layer (camera + photo viewer) to always-dark text */
    .dark-layer .text-white                     { color: white !important; }
    .dark-layer .text-white\/80                 { color: rgba(255,255,255,0.80) !important; }
    .dark-layer .text-white\/70                 { color: rgba(255,255,255,0.70) !important; }
    .dark-layer .text-white\/60                 { color: rgba(255,255,255,0.60) !important; }
    .dark-layer .text-white\/50                 { color: rgba(255,255,255,0.50) !important; }
    .dark-layer .text-white\/45                 { color: rgba(255,255,255,0.45) !important; }
    .dark-layer .text-white\/40                 { color: rgba(255,255,255,0.40) !important; }
    .dark-layer .text-white\/35                 { color: rgba(255,255,255,0.35) !important; }
    .dark-layer .text-white\/30                 { color: rgba(255,255,255,0.30) !important; }
    .dark-layer .text-white\/20                 { color: rgba(255,255,255,0.20) !important; }
    .dark-layer .text-white\/18                 { color: rgba(255,255,255,0.18) !important; }

    /* ── Base reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body {
      background: var(--pg-bg);
      color: var(--pg-text);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Safe-area helpers ─────────────────────── */
    .pb-safe  { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
    .pt-safe  { padding-top:    max(3rem,   env(safe-area-inset-top)); }

    /* ── Capture button ring pulse ─────────────── */
    @keyframes ring-pulse {
      0%   { transform: scale(1);   opacity: .8; }
      100% { transform: scale(1.45); opacity: 0;  }
    }
    .capture-btn::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid white;
      animation: ring-pulse 1.8s ease-out infinite;
      pointer-events: none;
    }

    /* ── Flash overlay ─────────────────────────── */
    @keyframes flash-out {
      0%   { opacity: .9; }
      100% { opacity: 0;  }
    }
    .flash-overlay {
      animation: flash-out 0.25s ease-out forwards;
    }

    /* ── Spirit-level bubble transition ─────────── */
    .level-bubble { transition: left .08s linear, background-color .2s; }

    /* ── Silhouette SVG ─────────────────────────── */
    .silhouette { pointer-events: none; position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── Guide overlay animations ─────────────────── */
    @keyframes bracket-pulse {
      0%, 100% { opacity: .80; filter: drop-shadow(0 0 3px rgba(99,210,255,.5)); }
      50%       { opacity: 1;   filter: drop-shadow(0 0 8px rgba(99,210,255,.95)); }
    }
    @keyframes bracket-ready {
      0%, 100% { opacity: .85; filter: drop-shadow(0 0 4px rgba(52,211,153,.6)); }
      50%       { opacity: 1;   filter: drop-shadow(0 0 10px rgba(52,211,153,1)); }
    }
    @keyframes crosshair-pulse {
      0%, 100% { opacity: .55; }
      50%       { opacity: 1;   }
    }
    @keyframes crosshair-ready {
      0%, 100% { opacity: .7;  filter: drop-shadow(0 0 4px rgba(52,211,153,.7)); }
      50%       { opacity: 1;   filter: drop-shadow(0 0 10px rgba(52,211,153,1)); }
    }
    @keyframes frankfort-pulse {
      0%, 100% { opacity: .75; filter: drop-shadow(0 0 2px rgba(253,200,50,.5)); }
      50%       { opacity: 1;   filter: drop-shadow(0 0 6px rgba(253,200,50,.9)); }
    }
    @keyframes scanline {
      0%   { transform: translateY(-5%); opacity: 0; }
      8%   { opacity: .45; }
      92%  { opacity: .45; }
      100% { transform: translateY(105%); opacity: 0; }
    }
    @keyframes guide-breathe {
      0%, 100% { opacity: .5; }
      50%       { opacity: .9; }
    }
    .guide-brackets     { animation: bracket-pulse  2.8s ease-in-out infinite; }
    .guide-brackets-rdy { animation: bracket-ready  1.8s ease-in-out infinite; }
    .guide-crosshair    { animation: crosshair-pulse 2.2s ease-in-out infinite; }
    .guide-crosshair-rdy{ animation: crosshair-ready 1.6s ease-in-out infinite; }
    .guide-frankfort    { animation: frankfort-pulse 3s ease-in-out infinite; }
    .guide-scanline     { animation: scanline 4s linear infinite; }
    .guide-breathe      { animation: guide-breathe 3s ease-in-out infinite; }

    /* ── Scrollbar hide ─────────────────────────── */
    .no-scroll::-webkit-scrollbar { display: none; }
    .no-scroll { scrollbar-width: none; }

    /* ── Design system additions ─────────────────── */

    /* Gradient primary button — adapts to active theme */
    .btn-primary {
      background: linear-gradient(135deg, var(--pg-accent-1) 0%, var(--pg-accent-2) 100%);
      box-shadow: 0 4px 20px var(--pg-accent-glow);
    }
    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

    /* Ghost secondary button */
    .btn-secondary {
      background: var(--pg-surface-hi);
      border: 1px solid var(--pg-border);
    }
    .btn-secondary:active { transform: scale(0.97); }

    /* Glass card */
    .glass-card {
      background: var(--pg-surface);
      border: 1px solid var(--pg-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* Bottom-sheet drag handle */
    .drag-handle {
      width: 2.25rem;
      height: 0.25rem;
      background: var(--pg-drag);
      border-radius: 9999px;
      margin: 0 auto 1.25rem;
    }

    /* Slide-up modal */
    @keyframes slide-up {
      from { transform: translateY(100%); opacity: 0.6; }
      to   { transform: translateY(0);    opacity: 1;   }
    }
    .slide-up { animation: slide-up 0.32s cubic-bezier(0.32, 0.72, 0, 1) both; }

    /* Fade-in-up for list items */
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fade-in-up 0.25s ease-out both; }

    /* Form input — focus glow (accent-aware) */
    .field-input:focus {
      outline: none;
      border-color: var(--pg-accent-1) !important;
      box-shadow: 0 0 0 3px var(--pg-accent-ring);
    }

    /* Section label */
    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--pg-t3);
    }

    /* Chevron icon */
    .chevron-right::after {
      content: '';
      display: inline-block;
      width: 6px; height: 10px;
      border-top: 1.5px solid rgba(255,255,255,0.2);
      border-right: 1.5px solid rgba(255,255,255,0.2);
      transform: rotate(45deg) translate(-2px, 1px);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    /* ================================================================
       PhotoGuide — Clinical Before & After Photography PWA
       ================================================================
       Components (in order):
         1. Constants & helpers
         2. IndexedDB layer  (DB)
         3. FrontalSilhouette  — SVG frontal face guide
         4. ProfileSilhouette  — SVG side-profile guide + Frankfort plane
         5. SpiritLevel        — DeviceOrientationEvent bubble level
         6. GhostOverlay       — 30% opacity pre-photo alignment aid
         7. CameraOverlay      — Main capture component (the core deliverable)
         8. GhostSelector      — Pick a pre-photo to ghost
         9. AddPatientModal
        10. PatientDetailView  — Per-patient gallery
        11. PatientListView    — Home screen
        12. InstallBanner
        13. App               — Router / state root
    ================================================================ */

    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ── 1. Constants ──────────────────────────────────────────────── */

    const CAPTURE_MODES = {
      front:        { id: 'front',        label: 'Front',          abbr: 'FR', color: 'blue',    category: 'face' },
      left:         { id: 'left',         label: 'Left Profile',   abbr: 'LP', color: 'violet',  category: 'face' },
      right:        { id: 'right',        label: 'Right Profile',  abbr: 'RP', color: 'emerald', category: 'face' },
      teeth_front:  { id: 'teeth_front',  label: 'Teeth Front',    abbr: 'TF', color: 'rose',    category: 'dental' },
      upper_arch:   { id: 'upper_arch',   label: 'Upper Arch',     abbr: 'UA', color: 'sky',     category: 'dental' },
      lower_arch:   { id: 'lower_arch',   label: 'Lower Arch',     abbr: 'LA', color: 'teal',    category: 'dental' },
      left_buccal:  { id: 'left_buccal',  label: 'Left Buccal',    abbr: 'LB', color: 'pink',    category: 'dental' },
      right_buccal: { id: 'right_buccal', label: 'Right Buccal',   abbr: 'RB', color: 'orange',  category: 'dental' },
    };
    const FACE_MODES   = Object.values(CAPTURE_MODES).filter(m => m.category === 'face');
    const DENTAL_MODES = Object.values(CAPTURE_MODES).filter(m => m.category === 'dental');

    const PHOTO_TYPE_COLORS = { pre: 'emerald', post: 'amber' };

    const JPEG_QUALITY  = 0.82;
    const MAX_DIMENSION = 2048;

    /* Admin email — only this user can approve new accounts */
    const ADMIN_EMAIL = 'sandeshjain91@gmail.com';

    /* Firebase config (hardcoded for clinic) */
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBUpmDrGHAB7WL32yTqms1dAYC_7dn9KCs",
      authDomain: "photoguide-4d046.firebaseapp.com",
      projectId: "photoguide-4d046",
      storageBucket: "photoguide-4d046.firebasestorage.app",
      messagingSenderId: "392378138847",
      appId: "1:392378138847:web:a720de5b114f6ee1b4a96a"
    };

    /*
     * Distance estimation constants.
     * FOCAL_K = face_width_cm * typical_frame_fraction for a ~65° HFOV camera.
     * Formula: distance_cm ≈ FOCAL_K / (face_bbox_width / video_width)
     */
    const FOCAL_K = 11;  // calibrated for 65° HFOV, 140mm avg face width
    const DISTANCE_RANGES = {
      face:   { min: 70,  max: 130, label: '70–130 cm' },
      dental: { min: 22,  max: 45,  label: '22–45 cm'  },
    };

    /* ── Theme system ──────────────────────────────────────────────── */

    const THEMES_CONFIG = [
      {
        id:   'clean-bright',
        name: 'Clean & Bright',
        icon: '☀️',
        tag:  'White & Blue',
        desc: 'Best for clinical photography — white backgrounds preserve true photo colours',
        preview: { bg: '#f4f8ff', surface: '#ffffff',  accent: '#2563eb' },
      },
      {
        id:   'dark-blue',
        name: 'Dark Mode',
        icon: '🌑',
        tag:  'Black & Bright Blue',
        desc: 'Best for X-ray viewing — reduces eye strain in dark rooms, bright buttons stay visible',
        preview: { bg: '#040810', surface: '#0a1628',  accent: '#0ea5e9' },
      },
      {
        id:   'calm-modern',
        name: 'Calm & Modern',
        icon: '🌿',
        tag:  'Light Grey & Soft Green',
        desc: 'Best for patient logs & galleries — relaxed, organised, less clinical',
        preview: { bg: '#eef2ee', surface: '#ffffff',  accent: '#059669' },
      },
    ];

    function applyTheme(id = 'clean-bright') {
      document.documentElement.dataset.theme = id;
      const metaColors = {
        'clean-bright': '#ffffff',
        'dark-blue':    '#040810',
        'calm-modern':  '#ffffff',
      };
      document.querySelector('meta[name="theme-color"]')
        ?.setAttribute('content', metaColors[id] || '#ffffff');
    }

    /*
     * Lazy-load TF.js + BlazeFace from local bundles (fallback for iOS/Safari
     * where the native FaceDetector API is unavailable).
     * Returns a Promise that resolves to the loaded BlazeFace model.
     */
    let _blazePromise = null;
    function loadBlazeFace() {
      if (_blazePromise) return _blazePromise;
      _blazePromise = (async () => {
        const inject = (src) => new Promise((res, rej) => {
          if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
          const s = document.createElement('script');
          s.src = src;
          s.onload = res;
          s.onerror = () => rej(new Error(`Failed to load ${src}`));
          document.head.appendChild(s);
        });
        await inject('lib/tf.min.js');
        await inject('lib/blazeface.min.js');
        return await window.blazeface.load();
      })();
      return _blazePromise;
    }

    /* ── 2. IndexedDB layer ────────────────────────────────────────── */

    const DB_NAME    = 'PhotoGuide_v3';
    const DB_VERSION = 3;
    let _db = null;

    function openDB() {
      if (_db) return Promise.resolve(_db);
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db  = e.target.result;
          const old = e.oldVersion;

          if (old < 1) {
            const ps = db.createObjectStore('patients', { keyPath: 'id' });
            ps.createIndex('name', 'name');
            const ph = db.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
            ph.createIndex('patientId',   'patientId');
            ph.createIndex('captureMode', 'captureMode');
            ph.createIndex('photoType',   'photoType');
            ph.createIndex('timestamp',   'timestamp');
          }

          if (old < 2) {
            /* procedures store */
            if (!db.objectStoreNames.contains('procedures')) {
              const pr = db.createObjectStore('procedures', { keyPath: 'id' });
              pr.createIndex('patientId', 'patientId');
              pr.createIndex('date', 'date');
            }
            /* procedureId index on photos */
            const photoStore = e.target.transaction.objectStore('photos');
            if (!photoStore.indexNames.contains('procedureId')) {
              photoStore.createIndex('procedureId', 'procedureId');
            }
            /* settings store (for Google Drive config) */
            if (!db.objectStoreNames.contains('settings')) {
              db.createObjectStore('settings', { keyPath: 'key' });
            }
            /* upload queue store (for Google Drive sync) */
            if (!db.objectStoreNames.contains('uploadQueue')) {
              const uq = db.createObjectStore('uploadQueue', { keyPath: 'id', autoIncrement: true });
              uq.createIndex('status',  'status');
              uq.createIndex('photoId', 'photoId');
            }
          }

          if (old < 3) {
            /* Firebase sync queue */
            if (!db.objectStoreNames.contains('firebaseSyncQueue')) {
              const fq = db.createObjectStore('firebaseSyncQueue', { keyPath: 'id', autoIncrement: true });
              fq.createIndex('status', 'status');
              fq.createIndex('action', 'action');
            }
          }
        };
        req.onsuccess = () => { _db = req.result; res(_db); };
        req.onerror   = () => rej(req.error);
      });
    }

    function idbIndexQuery(db, store, indexName, key) {
      return new Promise((res, rej) => {
        const tx  = db.transaction(store, 'readonly');
        const req = tx.objectStore(store).index(indexName).getAll(IDBKeyRange.only(key));
        req.onsuccess = () => res(req.result ?? []);
        req.onerror   = () => rej(req.error);
      });
    }

    const DB = {
      /* ── Patients ── */
      async savePatient(p)      { const db = await openDB(); return idbPut(db, 'patients', p); },
      async getPatients()       { const db = await openDB(); return idbGetAll(db, 'patients'); },
      async deletePatient(id)   {
        const db = await openDB();
        await idbDelete(db, 'patients', id);
        const procedures = await DB.getProceduresByPatient(id);
        for (const proc of procedures) await DB.deleteProcedure(proc.id);
        const photos = await DB.getPhotosByPatient(id);
        for (const ph of photos) await idbDelete(db, 'photos', ph.id);
      },

      /* ── Procedures ── */
      async saveProcedure(p)    { const db = await openDB(); return idbPut(db, 'procedures', p); },
      async getProceduresByPatient(pid) { const db = await openDB(); return idbIndexQuery(db, 'procedures', 'patientId', pid); },
      async deleteProcedure(id) {
        const db = await openDB();
        await idbDelete(db, 'procedures', id);
        const photos = await idbIndexQuery(db, 'photos', 'procedureId', id);
        for (const ph of photos) await idbDelete(db, 'photos', ph.id);
      },

      /* ── Photos ── */
      async savePhoto(p)        { const db = await openDB(); return idbAdd(db, 'photos', p); },
      async getPhotosByPatient(pid) { const db = await openDB(); return idbIndexQuery(db, 'photos', 'patientId', pid); },
      async getPhotosByProcedure(procId) { const db = await openDB(); return idbIndexQuery(db, 'photos', 'procedureId', procId); },
      async deletePhoto(id)     { const db = await openDB(); return idbDelete(db, 'photos', id); },

      /* ── Settings ── */
      async getSetting(key) {
        const db = await openDB();
        return new Promise((res, rej) => {
          const req = db.transaction('settings', 'readonly').objectStore('settings').get(key);
          req.onsuccess = () => res(req.result?.value ?? null);
          req.onerror   = () => rej(req.error);
        });
      },
      async setSetting(key, value) { const db = await openDB(); return idbPut(db, 'settings', { key, value }); },

      /* ── Upload Queue (Google Drive) ── */
      async addToUploadQueue(item) { const db = await openDB(); return idbAdd(db, 'uploadQueue', item); },
      async getUploadQueue(status) { const db = await openDB(); return idbIndexQuery(db, 'uploadQueue', 'status', status); },
      async updateUploadItem(item) { const db = await openDB(); return idbPut(db, 'uploadQueue', item); },

      /* ── Photo helpers for cross-device sync ── */
      async getPhotoById(id) {
        const db = await openDB();
        return new Promise((res, rej) => {
          const req = db.transaction('photos', 'readonly').objectStore('photos').get(id);
          req.onsuccess = () => res(req.result || null);
          req.onerror   = () => rej(req.error);
        });
      },
      /* Save photo metadata from Firebase (preserves local dataUrl if exists) */
      async savePhotoMeta(photo) {
        const db = await openDB();
        const existing = await this.getPhotoById(photo.id);
        if (existing && existing.dataUrl) return; // keep local blob
        return idbPut(db, 'photos', { ...photo });
      },

      /* ── Firebase Sync Queue ── */
      async addToFirebaseQueue(item) { const db = await openDB(); return idbAdd(db, 'firebaseSyncQueue', item); },
      async getFirebaseQueue(status) { const db = await openDB(); return idbIndexQuery(db, 'firebaseSyncQueue', 'status', status); },
      async updateFirebaseItem(item) { const db = await openDB(); return idbPut(db, 'firebaseSyncQueue', item); },
      async clearFirebaseQueue(status) {
        const db = await openDB();
        const items = await idbIndexQuery(db, 'firebaseSyncQueue', 'status', status);
        for (const it of items) await idbDelete(db, 'firebaseSyncQueue', it.id);
      },
    };

    function idbPut(db, store, val) {
      return new Promise((res, rej) => {
        const req = db.transaction(store, 'readwrite').objectStore(store).put(val);
        req.onsuccess = () => res(req.result);
        req.onerror   = () => rej(req.error);
      });
    }
    function idbAdd(db, store, val) {
      return new Promise((res, rej) => {
        const req = db.transaction(store, 'readwrite').objectStore(store).add(val);
        req.onsuccess = () => res(req.result);
        req.onerror   = () => rej(req.error);
      });
    }
    function idbGetAll(db, store) {
      return new Promise((res, rej) => {
        const req = db.transaction(store, 'readonly').objectStore(store).getAll();
        req.onsuccess = () => res(req.result ?? []);
        req.onerror   = () => rej(req.error);
      });
    }
    function idbDelete(db, store, key) {
      return new Promise((res, rej) => {
        const req = db.transaction(store, 'readwrite').objectStore(store).delete(key);
        req.onsuccess = () => res();
        req.onerror   = () => rej(req.error);
      });
    }

    /* ── 2b. Google Drive API helpers ────────────────────────────── */

    const DRIVE_API  = 'https://www.googleapis.com/drive/v3/files';
    const DRIVE_UPLOAD = 'https://www.googleapis.com/upload/drive/v3/files';

    const DriveAPI = {
      async findOrCreateFolder(name, parentId, token) {
        const q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`;
        const searchRes = await fetch(`${DRIVE_API}?q=${encodeURIComponent(q)}&fields=files(id,name)`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await searchRes.json();
        if (data.files?.length > 0) return data.files[0].id;

        const createRes = await fetch(DRIVE_API, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] }),
        });
        const folder = await createRes.json();
        return folder.id;
      },

      async uploadPhoto(blob, filename, folderId, token) {
        const metadata = JSON.stringify({ name: filename, parents: [folderId] });
        const form = new FormData();
        form.append('metadata', new Blob([metadata], { type: 'application/json' }));
        form.append('file', blob, filename);

        const res = await fetch(`${DRIVE_UPLOAD}?uploadType=multipart&fields=id`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: form,
        });
        const result = await res.json();
        return result.id;
      },

      async ensureFolderHierarchy(patientName, procedureName, token) {
        const rootId    = await this.findOrCreateFolder('PhotoGuide', 'root', token);
        const patientId = await this.findOrCreateFolder(patientName, rootId, token);
        const procId    = await this.findOrCreateFolder(procedureName, patientId, token);
        return procId;
      },
    };

    /* ── 2c. Upload Queue Processor ──────────────────────────────── */

    let _uploadRunning = false;

    async function processUploadQueue() {
      if (_uploadRunning) return;
      _uploadRunning = true;
      try {
        const driveEnabled = await DB.getSetting('driveEnabled');
        const clientId     = await DB.getSetting('googleClientId');
        if (!driveEnabled || !clientId) { _uploadRunning = false; return; }

        const pending = await DB.getUploadQueue('pending');
        if (pending.length === 0) { _uploadRunning = false; return; }

        /* Get access token (silent re-auth if session active) */
        const token = await new Promise((resolve, reject) => {
          if (!window.google?.accounts?.oauth2) { reject(new Error('GIS not loaded')); return; }
          const client = google.accounts.oauth2.initTokenModel({
            client_id: clientId,
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (resp) => {
              if (resp.error) reject(new Error(resp.error));
              else resolve(resp.access_token);
            },
          });
          client.requestAccessToken({ prompt: '' });
        });

        for (const item of pending) {
          try {
            item.status = 'uploading';
            await DB.updateUploadItem(item);

            const folderId = await DriveAPI.ensureFolderHierarchy(
              item.patientName, item.procedureName || 'General', token
            );

            /* Convert dataUrl to blob for upload */
            const resp = await fetch(item.dataUrl);
            const blob = await resp.blob();

            await DriveAPI.uploadPhoto(blob, item.filename, folderId, token);
            item.status = 'done';
            await DB.updateUploadItem(item);
          } catch (err) {
            console.error('Drive upload error:', err);
            item.retries = (item.retries || 0) + 1;
            item.status = item.retries >= 3 ? 'error' : 'pending';
            await DB.updateUploadItem(item);
          }
        }
      } catch (err) {
        console.error('Upload queue error:', err);
      }
      _uploadRunning = false;
    }

    /* ── 2d. Firebase Initialization ─────────────────────────────── */

    let _firebaseApp = null;
    let _firestore   = null;
    let _fbStorage   = null;
    let _firebaseAuth = null;

    async function getFirebaseAuth() {
      if (_firebaseAuth) return _firebaseAuth;
      try {
        if (!_firebaseApp) {
          _firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
        }
        _firebaseAuth = firebase.auth();
        return _firebaseAuth;
      } catch (err) {
        console.error('[Firebase Auth] init error:', err);
        return null;
      }
    }

    async function getFirebase() {
      if (_firestore && _fbStorage) return { db: _firestore, storage: _fbStorage };
      try {
        if (!_firebaseApp) {
          _firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
        }
        _firestore = firebase.firestore();
        _fbStorage = firebase.storage();
        try { await _firestore.enablePersistence({ synchronizeTabs: false }); } catch (_) {}
        return { db: _firestore, storage: _fbStorage };
      } catch (err) {
        console.error('[Firebase] init error:', err);
        return null;
      }
    }

    /* ── 2e. Firebase Sync Engine ─────────────────────────────────── */

    const FirebaseSync = {
      async syncPatient(patient) {
        const fb = await getFirebase();
        if (!fb) return;
        const { id, ...data } = patient;
        await fb.db.collection('patients').doc(id).set({
          ...data,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        }, { merge: true });
      },

      async syncProcedure(procedure) {
        const fb = await getFirebase();
        if (!fb) return;
        const { id, patientId, ...data } = procedure;
        await fb.db.collection('patients').doc(patientId)
          .collection('procedures').doc(id)
          .set({ ...data, patientId, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      },

      async syncPhoto(photo, dataUrl) {
        const fb = await getFirebase();
        if (!fb) return;
        const photoId     = String(photo.id || photo.timestamp);
        const storagePath = `photos/${photo.patientId}/${photo.procedureId || 'general'}/${photoId}.jpg`;

        /* Upload blob to Firebase Storage */
        const resp = await fetch(dataUrl);
        const blob = await resp.blob();
        const ref  = fb.storage.ref(storagePath);
        await ref.put(blob);
        const downloadUrl = await ref.getDownloadURL();

        /* Write metadata (NO dataUrl) to Firestore */
        const { dataUrl: _, ...metadata } = photo;
        await fb.db.collection('patients').doc(photo.patientId)
          .collection('photos').doc(photoId)
          .set({
            ...metadata,
            storageRef:  storagePath,
            downloadUrl,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          }, { merge: true });
      },

      async deletePatient(patientId) {
        const fb = await getFirebase();
        if (!fb) return;
        try {
          const procsSnap  = await fb.db.collection('patients').doc(patientId).collection('procedures').get();
          const photosSnap = await fb.db.collection('patients').doc(patientId).collection('photos').get();
          const batch = fb.db.batch();
          procsSnap.docs.forEach(d => batch.delete(d.ref));
          photosSnap.docs.forEach(d => batch.delete(d.ref));
          batch.delete(fb.db.collection('patients').doc(patientId));
          await batch.commit();
          /* Delete storage folder */
          try {
            const listResult = await fb.storage.ref(`photos/${patientId}`).listAll();
            await Promise.all(listResult.items.map(item => item.delete()));
            for (const prefix of listResult.prefixes) {
              const sub = await prefix.listAll();
              await Promise.all(sub.items.map(item => item.delete()));
            }
          } catch (_) {}
        } catch (err) { console.error('[Firebase] deletePatient error:', err); }
      },

      async deleteProcedure(patientId, procedureId) {
        const fb = await getFirebase();
        if (!fb) return;
        try {
          await fb.db.collection('patients').doc(patientId).collection('procedures').doc(procedureId).delete();
          const photosSnap = await fb.db.collection('patients').doc(patientId).collection('photos')
            .where('procedureId', '==', procedureId).get();
          const batch = fb.db.batch();
          photosSnap.docs.forEach(d => batch.delete(d.ref));
          await batch.commit();
          try {
            const listResult = await fb.storage.ref(`photos/${patientId}/${procedureId}`).listAll();
            await Promise.all(listResult.items.map(item => item.delete()));
          } catch (_) {}
        } catch (err) { console.error('[Firebase] deleteProcedure error:', err); }
      },

      async deletePhoto(patientId, photoId) {
        const fb = await getFirebase();
        if (!fb) return;
        try {
          const docRef = fb.db.collection('patients').doc(patientId).collection('photos').doc(String(photoId));
          const snap   = await docRef.get();
          if (snap.exists && snap.data().storageRef) {
            try { await fb.storage.ref(snap.data().storageRef).delete(); } catch (_) {}
          }
          await docRef.delete();
        } catch (err) { console.error('[Firebase] deletePhoto error:', err); }
      },
    };

    /* ── 2f. Firebase Sync Queue Processor ────────────────────────── */

    let _fbSyncRunning = false;

    async function processFirebaseSyncQueue() {
      if (_fbSyncRunning) return;
      _fbSyncRunning = true;
      try {
        const fb = await getFirebase();
        if (!fb) { _fbSyncRunning = false; return; }

        const pending = await DB.getFirebaseQueue('pending');
        for (const item of pending) {
          try {
            item.status = 'uploading';
            await DB.updateFirebaseItem(item);

            switch (item.action) {
              case 'sync_patient':       await FirebaseSync.syncPatient(item.payload); break;
              case 'sync_procedure':     await FirebaseSync.syncProcedure(item.payload); break;
              case 'sync_photo':         await FirebaseSync.syncPhoto(item.payload, item.dataUrl); break;
              case 'delete_patient':     await FirebaseSync.deletePatient(item.payload.id); break;
              case 'delete_procedure':   await FirebaseSync.deleteProcedure(item.payload.patientId, item.payload.id); break;
              case 'delete_photo':       await FirebaseSync.deletePhoto(item.payload.patientId, item.payload.id); break;
            }

            item.status = 'done';
            await DB.updateFirebaseItem(item);
          } catch (err) {
            console.error('[Firebase] sync item error:', err);
            item.retries = (item.retries || 0) + 1;
            item.status = item.retries >= 5 ? 'error' : 'pending';
            await DB.updateFirebaseItem(item);
          }
        }
        /* Cleanup completed items */
        await DB.clearFirebaseQueue('done');
      } catch (err) {
        console.error('[Firebase] queue error:', err);
      }
      _fbSyncRunning = false;
    }

    /* ── 2g. Auto-enqueue Firebase sync on DB writes ─────────────── */

    /*
     * Pull all clinic data from Firestore into local IndexedDB.
     * Called once after login so any device sees the full dataset.
     * Safe to call again — it merges rather than overwrites local blobs.
     */
    async function syncFromFirebase(onProgress) {
      const fb = await getFirebase();
      if (!fb) return;
      try {
        onProgress?.('patients');
        const patientsSnap = await fb.db.collection('patients').get();

        for (const doc of patientsSnap.docs) {
          const d = doc.data();
          await DB.savePatient({
            id: doc.id,
            ...d,
            createdAt: d.createdAt?.toMillis?.() || d.createdAt || Date.now(),
          });
        }

        onProgress?.('procedures');
        for (const doc of patientsSnap.docs) {
          const procsSnap = await fb.db.collection('patients').doc(doc.id)
            .collection('procedures').get();
          for (const pDoc of procsSnap.docs) {
            const d = pDoc.data();
            await DB.saveProcedure({
              id:        pDoc.id,
              patientId: doc.id,
              ...d,
              date: d.date || '',
            });
          }
        }

        onProgress?.('photos');
        for (const doc of patientsSnap.docs) {
          const photosSnap = await fb.db.collection('patients').doc(doc.id)
            .collection('photos').get();
          for (const phDoc of photosSnap.docs) {
            const d = phDoc.data();
            const id = isNaN(phDoc.id) ? phDoc.id : Number(phDoc.id);
            await DB.savePhotoMeta({
              id,
              patientId: doc.id,
              ...d,
              dataUrl:   null, // no local blob on remote device; display uses downloadUrl
              timestamp: d.timestamp || Date.now(),
            });
          }
        }
        onProgress?.('done');
      } catch (err) {
        console.error('[Firebase] syncFromFirebase error:', err);
        onProgress?.('done');
      }
    }

    async function enqueueFirebaseSync(action, payload, dataUrl) {
      /* Firebase always available (hardcoded config) */
      await DB.addToFirebaseQueue({
        action,
        payload,
        dataUrl: dataUrl || null,
        status: 'pending',
        retries: 0,
        createdAt: Date.now(),
      });
      processFirebaseSyncQueue(); // attempt immediately (non-blocking)
    }

    /* Retry on reconnect */
    window.addEventListener('online', () => {
      processUploadQueue();
      processFirebaseSyncQueue();
    });

    /* Listen for service worker sync messages */
    if (navigator.serviceWorker) {
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data?.type === 'SYNC_UPLOADS') {
          processUploadQueue();
          processFirebaseSyncQueue();
        }
      });
    }

    /* ── 4c. ReadinessHUD ──────────────────────────────────────────── */
    /*
     * Unified "traffic light" readiness system. Replaces the old separate
     * DistanceMeter and SpiritLevel components with a single HUD that:
     *   1. Runs FaceDetector (native API) to get centering + distance
     *   2. Reads device gamma for levelling
     *   3. Shows a 3-condition checklist: Centered · Distance · Level
     *   4. Provides a single dynamic coaching instruction
     *   5. Notifies parent via onReadyChange(allReady, coachingText)
     * For dental modes, only Level is checked (FaceDetector doesn't help).
     */
    /*
     * TrueVertical — gravity-aligned plumb line.
     * Uses DeviceOrientationEvent.gamma (left-right tilt) to rotate a line
     * by -gamma degrees so it always points toward the ground.
     * Green when within ±1.5°, amber within ±5°, white otherwise.
     * Transition: smooth 80ms so it tracks movement without jitter.
     */
    function TrueVertical({ gamma }) {
      const abs    = Math.abs(gamma);
      const isTrue = abs < 1.5;
      const isNear = abs < 5;
      const color  = isTrue ? 'rgba(52,211,153,0.9)'
                   : isNear ? 'rgba(251,191,36,0.8)'
                   :          'rgba(255,255,255,0.6)';
      const glow   = isTrue ? '0 0 8px rgba(52,211,153,0.85)'
                   : isNear ? '0 0 6px rgba(251,191,36,0.7)'
                   :          'none';
      const transition = 'transform 0.08s linear, background 0.2s, box-shadow 0.2s';

      return (
        <div className="absolute inset-0 z-25 pointer-events-none">
          {/*
           * Rotating line: anchored at horizontal centre, rotates by -gamma
           * so it always points toward gravity regardless of phone tilt.
           * left: calc(50% - 0.75px) centres the 1.5px-wide element.
           * transformOrigin centre rotates around the mid-point of the line.
           */}
          <div style={{
            position:        'absolute',
            top:             0,
            left:            'calc(50% - 0.75px)',
            width:           '1.5px',
            height:          '100%',
            background:      `linear-gradient(to bottom,
              transparent 0%, ${color} 8%, ${color} 92%, transparent 100%)`,
            transform:       `rotate(${-gamma}deg)`,
            transformOrigin: 'center center',
            transition,
            boxShadow:       glow,
          }}>
            {/* Plumb bob — lives inside the rotating element so it tracks the tip */}
            <div style={{
              position:     'absolute',
              bottom:       '8%',
              left:         '50%',
              transform:    'translateX(-50%)',
              width:        '10px',
              height:       '10px',
              borderRadius: '50%',
              background:   color,
              boxShadow:    glow,
              transition,
            }} />
          </div>

          {/* Degree badge — centred at bottom, not rotated */}
          {abs > 1.5 && (
            <div style={{
              position:     'absolute',
              bottom:       '4%',
              left:         '50%',
              transform:    'translateX(-50%)',
              background:   'rgba(0,0,0,0.6)',
              borderRadius: '999px',
              padding:      '3px 10px',
              color,
              fontSize:     '12px',
              fontFamily:   'monospace',
              fontWeight:   'bold',
              whiteSpace:   'nowrap',
            }}>
              {gamma > 0 ? '← ' : '→ '}{abs.toFixed(1)}°
            </div>
          )}
        </div>
      );
    }

    function ReadinessHUD({ videoRef, captureMode, gamma, onReadyChange }) {
      const [faceData, setFaceData] = useState(null); // { centerX, centerY, distance }
      const [hasFD,    setHasFD]    = useState(false); // FaceDetector available?
      const detectorRef = useRef(null);
      const timerRef    = useRef(null);
      const runningRef  = useRef(true);
      const prevRef     = useRef({ ready: false, coaching: '' });

      const category  = CAPTURE_MODES[captureMode]?.category || 'face';
      const range     = DISTANCE_RANGES[category] || DISTANCE_RANGES.face;
      const isFace    = category === 'face';

      /* ── Init face detection (native FaceDetector → BlazeFace fallback) ── */
      const backendRef = useRef(null); // 'native' | 'blaze'
      const blazeRef   = useRef(null); // BlazeFace model (if used)

      useEffect(() => {
        runningRef.current = true;
        if (!isFace) return;

        if ('FaceDetector' in window) {
          try {
            detectorRef.current = new window.FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
            backendRef.current = 'native';
            setHasFD(true);
            detectLoop();
          } catch (_) {
            // native failed, try BlazeFace
            initBlazeFace();
          }
        } else {
          initBlazeFace();
        }

        return () => {
          runningRef.current = false;
          clearTimeout(timerRef.current);
          if (blazeRef.current?.dispose) blazeRef.current.dispose();
        };
      }, []); // eslint-disable-line

      const initBlazeFace = () => {
        loadBlazeFace()
          .then((model) => {
            if (!runningRef.current) return;
            blazeRef.current = model;
            backendRef.current = 'blaze';
            setHasFD(true);
            detectLoop();
          })
          .catch((err) => {
            console.warn('[ReadinessHUD] BlazeFace load failed:', err.message);
          });
      };

      const detectLoop = async () => {
        if (!runningRef.current) return;
        const video = videoRef?.current;
        if (!video || video.readyState < 2) {
          timerRef.current = setTimeout(detectLoop, 300);
          return;
        }
        try {
          if (backendRef.current === 'native') {
            /* ── Native FaceDetector (Chrome/Android) ── */
            const faces = await detectorRef.current.detect(video);
            if (!runningRef.current) return;
            if (faces.length > 0) {
              const bb   = faces[0].boundingBox;
              const vW   = video.offsetWidth  || video.videoWidth  || 1;
              const vH   = video.offsetHeight || video.videoHeight || 1;
              const cx   = (bb.x + bb.width / 2) / vW;
              const cy   = (bb.y + bb.height / 2) / vH;
              const frac = bb.width / vW;
              setFaceData({ centerX: cx, centerY: cy, distance: Math.round(FOCAL_K / frac) });
            } else {
              setFaceData(null);
            }
          } else if (backendRef.current === 'blaze') {
            /* ── BlazeFace fallback (iOS/Safari) ── */
            const preds = await blazeRef.current.estimateFaces(video, false);
            if (!runningRef.current) return;
            if (preds.length > 0) {
              const [x1, y1] = preds[0].topLeft;
              const [x2, y2] = preds[0].bottomRight;
              const vW   = video.videoWidth  || 1;
              const vH   = video.videoHeight || 1;
              const cx   = ((x1 + x2) / 2) / vW;
              const cy   = ((y1 + y2) / 2) / vH;
              const frac = (x2 - x1) / vW;
              setFaceData({ centerX: cx, centerY: cy, distance: Math.round(FOCAL_K / frac) });
            } else {
              setFaceData(null);
            }
          }
        } catch (_) {}
        timerRef.current = setTimeout(detectLoop, 350);
      };

      /* ── Compute conditions ── */
      const absG     = Math.abs(gamma);
      const isLevel  = absG < 2;
      const isClose  = absG < 5;

      const isCentered = faceData
        ? Math.abs(faceData.centerX - 0.5) < 0.1 && Math.abs(faceData.centerY - 0.38) < 0.12
        : false;
      const isDistOK = faceData
        ? faceData.distance >= range.min && faceData.distance <= range.max
        : false;

      const checks = isFace && hasFD
        ? [
            { key: 'center', label: 'Centered', ok: isCentered },
            { key: 'dist',   label: faceData ? `${faceData.distance} cm` : 'Distance', ok: isDistOK },
            { key: 'level',  label: 'Level',    ok: isLevel },
          ]
        : [{ key: 'level', label: 'Level', ok: isLevel }];

      const allReady = checks.every(c => c.ok) && (isFace ? (hasFD ? !!faceData : isLevel) : isLevel);

      /* ── Compute coaching text ── */
      let coaching = '';
      if (isFace && hasFD) {
        if (!faceData) {
          coaching = 'Position face in frame';
        } else if (!isLevel && absG >= 5) {
          coaching = gamma > 0 ? 'Tilt device left' : 'Tilt device right';
        } else if (!isDistOK) {
          coaching = faceData.distance < range.min ? 'Move further back' : 'Move closer';
        } else if (!isCentered) {
          const dx = faceData.centerX - 0.5;
          const dy = faceData.centerY - 0.38;
          coaching = Math.abs(dx) > Math.abs(dy)
            ? (dx > 0 ? 'Shift camera left' : 'Shift camera right')
            : (dy > 0 ? 'Shift camera up' : 'Shift camera down');
        } else if (!isLevel) {
          coaching = gamma > 0 ? 'Tilt slightly left' : 'Tilt slightly right';
        } else {
          coaching = 'Ready — capture now';
        }
      } else if (isFace) {
        // No FaceDetector — just level coaching
        if (!isLevel) coaching = absG >= 5
          ? (gamma > 0 ? 'Tilt device left' : 'Tilt device right')
          : (gamma > 0 ? 'Tilt slightly left' : 'Tilt slightly right');
        else coaching = `Hold at ${range.label}`;
      } else {
        // Dental modes
        if (!isLevel) coaching = gamma > 0 ? 'Tilt device left' : 'Tilt device right';
        else if (captureMode === 'upper_arch' || captureMode === 'lower_arch')
          coaching = 'Mirror parallel to arch · hold steady';
        else if (captureMode === 'teeth_front')
          coaching = 'Lip retractors · align midline';
        else coaching = 'Cheek retractors · align teeth';
      }

      /* ── Notify parent ── */
      useEffect(() => {
        if (prevRef.current.ready !== allReady || prevRef.current.coaching !== coaching) {
          prevRef.current = { ready: allReady, coaching };
          onReadyChange?.(allReady, coaching);
        }
      });

      /* ── Spirit level bar (always shown) ── */
      const travel      = Math.max(-36, Math.min(36, gamma * 2.4));
      const bubbleColor = isLevel
        ? 'bg-green-400 shadow-[0_0_10px_rgba(74,222,128,0.9)]'
        : isClose
          ? 'bg-yellow-400 shadow-[0_0_6px_rgba(250,204,21,0.7)]'
          : 'bg-red-500 shadow-[0_0_6px_rgba(239,68,68,0.7)]';

      return (
        <>
          {/* ── Spirit level bar (top centre) ── */}
          <div className="absolute top-5 left-1/2 -translate-x-1/2 z-30 pointer-events-none">
            <div className="relative w-28 h-5 bg-black/50 rounded-full border border-white/25 overflow-hidden flex items-center">
              <div className="absolute left-1/2 top-1 bottom-1 w-px bg-white/40 -translate-x-px" />
              <div
                className={`level-bubble absolute top-1 bottom-1 w-7 rounded-full ${bubbleColor}`}
                style={{ left: `calc(50% + ${travel}px - 14px)` }}
              />
            </div>
          </div>

          {/* ── Readiness checklist (top-right) ── */}
          {isFace && hasFD && (
            <div className="absolute top-28 right-3 z-30 pointer-events-none">
              <div className="bg-black/60 backdrop-blur-sm rounded-xl px-2.5 py-2 space-y-1.5">
                {checks.map(c => (
                  <div key={c.key} className="flex items-center gap-1.5">
                    <div className={`w-2.5 h-2.5 rounded-full transition-colors duration-300 ${
                      c.ok ? 'bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.7)]' : 'bg-red-400/60'
                    }`} />
                    <span className={`text-[11px] font-mono transition-colors duration-300 ${
                      c.ok ? 'text-emerald-400' : 'text-white/50'
                    }`}>
                      {c.label}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── Static distance fallback (no FaceDetector) ── */}
          {isFace && !hasFD && (
            <div className="absolute top-28 right-3 z-30 pointer-events-none">
              <div className="bg-black/60 backdrop-blur-sm border border-white/15 rounded-xl px-2.5 py-2 text-center">
                <p className="text-[9px] text-white/45 leading-none">Distance</p>
                <p className="text-xs font-bold text-white/70 mt-0.5 font-mono">{range.label}</p>
              </div>
            </div>
          )}
        </>
      );
    }

    /* ── 6. GhostOverlay ───────────────────────────────────────────── */
    /*
     * Renders the pre-treatment reference image as a semi-transparent layer
     * over the live camera feed. Opacity is adjustable (default 30%).
     * A subtle amber border confirms ghosting is active.
     */
    function GhostOverlay({ imageUrl, opacity, visible }) {
      if (!imageUrl || !visible) return null;
      return (
        <div
          className="absolute inset-0 z-10 pointer-events-none"
          style={{ opacity }}
        >
          <img src={imageUrl} alt="ghost reference" className="w-full h-full object-cover" />
          {/* Amber border reminder */}
          <div className="absolute inset-0 border-2 border-amber-400/60 rounded-sm" />
          <div className="absolute top-2 right-2 bg-amber-500 text-black text-[10px] font-extrabold px-2 py-0.5 rounded-full tracking-wider">
            GHOST ON
          </div>
        </div>
      );
    }

    /* ── 7. CameraOverlay ──────────────────────────────────────────── */
    /*
     * The primary capture component.
     *
     * Camera setup:
     *   • Enumerates devices, preferring telephoto / non-ultra-wide rear lenses
     *     (wide-angle distorts nasal/auricular proportions in clinical photos).
     *   • Requests 4:3 aspect ratio at up to 4K resolution.
     *   • Applies manual focus, exposure, and white-balance lock on demand.
     *
     * Silhouette guide:
     *   • FrontalSilhouette for 'front' mode (Frankfort plane as horizontal reference).
     *   • ProfileSilhouette for 'left' / 'right' modes (Frankfort plane + two gold dots).
     *
     * Ghost overlay:
     *   • When photoType === 'post' and a ghostImageUrl is provided, the pre-image
     *     is composited at adjustable opacity (0–60%) over the live feed so the
     *     clinician can match patient positioning exactly.
     *
     * Spirit level:
     *   • Reads DeviceOrientationEvent.gamma to render a real-time bubble level.
     *
     * Capture:
     *   • Draws the full-resolution video frame to an off-screen canvas.
     *   • Mirrors the canvas for right-profile so the stored image is anatomically
     *     correct (not a mirror image).
     *   • Emits { captureMode, photoType, timestamp, width, height, dataUrl, mimeType }
     *     plus the raw Blob via the onCapture callback.
     */
    function CameraOverlay({
      captureMode   = 'front',
      photoType     = 'pre',
      ghostImageUrl = null,
      onCapture,
      onClose,
      patientName   = '',
    }) {
      const videoRef    = useRef(null);
      const canvasRef   = useRef(null);
      const streamRef   = useRef(null);
      const trackRef    = useRef(null);

      const [isReady,       setIsReady]       = useState(false);
      const [orientation,   setOrientation]   = useState({ gamma: 0 });
      const [isLocked,      setIsLocked]      = useState(false);
      const [showGhost,     setShowGhost]     = useState(true);
      const [ghostOpacity,  setGhostOpacity]  = useState(0.30);
      const [error,         setError]         = useState(null);
      const [isCapturing,   setIsCapturing]   = useState(false);
      const [flashActive,   setFlashActive]   = useState(false);
      const [capabilities,  setCapabilities]  = useState({});
      const [videoRes,      setVideoRes]      = useState('');
      const [captureReady,  setCaptureReady]  = useState(false);
      const [coaching,      setCoaching]      = useState('');

      const handleReadyChange = useCallback((ready, text) => {
        setCaptureReady(ready);
        setCoaching(text);
      }, []);

      /* ── Request iOS DeviceOrientation permission ── */
      const requestOrientationPermission = useCallback(async () => {
        if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
          try { await DeviceOrientationEvent.requestPermission(); } catch (_) {}
        }
      }, []);

      /* ── Camera init ─────────────────────────────────────────────── */
      const startCamera = useCallback(async () => {
        setError(null);
        setIsReady(false);
        try {
          /* Step 1: enumerate to find a telephoto / standard rear lens */
          let deviceId = null;
          try {
            const devs   = await navigator.mediaDevices.enumerateDevices();
            const vDevs  = devs.filter(d => d.kind === 'videoinput');
            const tele   = vDevs.find(d => /tele|2x|3x|telephoto/i.test(d.label));
            const back   = vDevs.find(d => /back|rear/i.test(d.label) && !/ultra|wide/i.test(d.label));
            deviceId = (tele ?? back)?.deviceId ?? null;
          } catch (_) { /* enumeration denied — use facingMode fallback */ }

          /* Step 2: build constraints — 4:3 portrait, high-res */
          const videoConstraints = {
            facingMode: 'environment',
            width:       { ideal: 3840, min: 1280 },
            height:      { ideal: 2880, min: 960  },
            aspectRatio: { ideal: 4/3             },
            ...(deviceId ? { deviceId: { exact: deviceId } } : {}),
          };

          const stream = await navigator.mediaDevices.getUserMedia({
            video: videoConstraints,
            audio: false,
          });

          streamRef.current = stream;
          const track = stream.getVideoTracks()[0];
          trackRef.current = track;

          const caps = track.getCapabilities?.() ?? {};
          setCapabilities(caps);

          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.onloadedmetadata = () => {
              videoRef.current.play();
              const { videoWidth: w, videoHeight: h } = videoRef.current;
              setVideoRes(`${w}×${h}`);
              setIsReady(true);
            };
          }
        } catch (err) {
          setError(`Camera unavailable: ${err.message}`);
        }
      }, []);

      /* ── Focus / exposure lock ───────────────────────────────────── */
      const applyLock = useCallback(async (lock) => {
        const track = trackRef.current;
        if (!track) return;
        const caps    = track.getCapabilities?.() ?? {};
        const adv     = [];
        if (lock) {
          if (caps.focusMode?.includes('manual'))    adv.push({ focusMode:       'manual'     });
          if (caps.exposureMode?.includes('manual')) adv.push({ exposureMode:    'manual'     });
          if (caps.whiteBalanceMode?.includes('manual')) adv.push({ whiteBalanceMode: 'manual' });
        } else {
          if (caps.focusMode?.includes('continuous'))    adv.push({ focusMode:       'continuous' });
          if (caps.exposureMode?.includes('continuous')) adv.push({ exposureMode:    'continuous' });
          if (caps.whiteBalanceMode?.includes('continuous')) adv.push({ whiteBalanceMode: 'continuous' });
        }
        try {
          if (adv.length) await track.applyConstraints({ advanced: adv });
        } catch (_) { /* API not fully supported on this device */ }
        setIsLocked(lock);
      }, []);

      /* ── Photo capture ───────────────────────────────────────────── */
      const capturePhoto = useCallback(async () => {
        const video = videoRef.current;
        if (!video || !isReady || isCapturing) return;

        setIsCapturing(true);

        /* Flash feedback */
        setFlashActive(true);
        setTimeout(() => setFlashActive(false), 220);

        try {
          const canvas = canvasRef.current;
          let w = video.videoWidth;
          let h = video.videoHeight;

          /* Down-scale if either dimension exceeds MAX_DIMENSION */
          if (Math.max(w, h) > MAX_DIMENSION) {
            const scale = MAX_DIMENSION / Math.max(w, h);
            w = Math.round(w * scale);
            h = Math.round(h * scale);
          }
          canvas.width  = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');

          /* No flip needed — video is never mirrored, raw frame is anatomically correct. */
          ctx.drawImage(video, 0, 0, w, h);

          canvas.toBlob((blob) => {
            if (!blob) { setIsCapturing(false); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
              onCapture?.({
                captureMode,
                photoType,
                timestamp: Date.now(),
                width:     w,
                height:    h,
                dataUrl:   ev.target.result,
                mimeType:  'image/jpeg',
              }, blob);
              setIsCapturing(false);
            };
            reader.readAsDataURL(blob);
          }, 'image/jpeg', JPEG_QUALITY);
        } catch (err) {
          console.error('Capture error', err);
          setIsCapturing(false);
        }
      }, [isReady, isCapturing, captureMode, photoType, onCapture]);

      /* ── Device orientation ──────────────────────────────────────── */
      useEffect(() => {
        const handler = (e) => setOrientation({ gamma: e.gamma ?? 0 });
        window.addEventListener('deviceorientation', handler);
        return () => window.removeEventListener('deviceorientation', handler);
      }, []);

      /* ── Lifecycle ───────────────────────────────────────────────── */
      useEffect(() => {
        requestOrientationPermission();
        startCamera();
        return () => {
          streamRef.current?.getTracks().forEach(t => t.stop());
        };
      }, []); // eslint-disable-line

      const modeCfg    = CAPTURE_MODES[captureMode];

      const SILHOUETTE_MAP = {
        front:        () => <FrontalGuide         ready={captureReady} />,
        left:         () => <ProfileGuide         side="left"  ready={captureReady} />,
        right:        () => <ProfileGuide         side="right" ready={captureReady} />,
        teeth_front:  () => <TeethFrontalSilhouette             ready={captureReady} />,
        upper_arch:   () => <UpperArchSilhouette               ready={captureReady} />,
        lower_arch:   () => <LowerArchSilhouette               ready={captureReady} />,
        left_buccal:  () => <BuccalSilhouette     side="left"  ready={captureReady} />,
        right_buccal: () => <BuccalSilhouette     side="right" ready={captureReady} />,
      };
      const renderSilhouette = SILHOUETTE_MAP[captureMode] || (() => null);

      return (
        <div className="fixed inset-0 z-50 bg-black flex flex-col dark-layer">

          {/* ── Flash overlay ── */}
          {flashActive && (
            <div className="absolute inset-0 z-50 bg-white flash-overlay pointer-events-none" />
          )}

          {/* ── Camera viewport ── */}
          <div className="relative flex-1 overflow-hidden bg-black">
            <video
              ref={videoRef}
              className="w-full h-full object-cover"
              autoPlay playsInline muted
              style={{ transform: 'none' }}
            />

            {/* Hidden capture canvas */}
            <canvas ref={canvasRef} className="hidden" />

            {/* ── Ghost overlay (POST mode) ── */}
            <GhostOverlay
              imageUrl={ghostImageUrl}
              opacity={ghostOpacity}
              visible={showGhost && photoType === 'post'}
            />

            {/* ── Silhouette guide ── */}
            <div className="absolute inset-0 z-20 pointer-events-none">
              {renderSilhouette()}
            </div>

            {/* ── True vertical plumb line ── */}
            {isReady && <TrueVertical gamma={orientation.gamma} />}

            {/* ── Readiness HUD (spirit level + checklist + coaching) ── */}
            {isReady && (
              <ReadinessHUD
                videoRef={videoRef}
                captureMode={captureMode}
                gamma={orientation.gamma}
                onReadyChange={handleReadyChange}
              />
            )}

            {/* ── Mode + type badge ── */}
            <div className="absolute top-16 left-4 z-30 flex items-center gap-2">
              <div className="bg-black/60 backdrop-blur-sm rounded-full px-3 py-1.5 flex items-center gap-2">
                <span className="text-white text-sm font-bold">{modeCfg.label}</span>
                <span className={`text-xs font-extrabold px-2 py-0.5 rounded-full ${
                  photoType === 'pre'
                    ? 'bg-emerald-500 text-white'
                    : 'bg-amber-500  text-black'
                }`}>
                  {photoType.toUpperCase()}
                </span>
              </div>
            </div>

            {/* ── Lock indicator ── */}
            {isLocked && (
              <div className="absolute top-4 right-4 z-30">
                <div className="bg-amber-500/90 rounded-full px-3 py-1.5 flex items-center gap-1.5">
                  <span className="text-base">🔒</span>
                  <span className="text-black text-xs font-bold">LOCKED</span>
                </div>
              </div>
            )}

            {/* (DistanceMeter + SpiritLevel merged into ReadinessHUD above) */}

            {/* ── Resolution watermark ── */}
            {videoRes && (
              <div className="absolute bottom-2 right-2 z-30 text-white/30 text-[10px] font-mono">
                {videoRes}
              </div>
            )}

            {/* ── Patient name strip ── */}
            {patientName && (
              <div className="absolute bottom-24 left-0 right-0 z-30 flex justify-center pointer-events-none">
                <div className="bg-black/60 backdrop-blur-sm rounded-full px-4 py-1.5">
                  <span className="text-white/70 text-sm">{patientName}</span>
                </div>
              </div>
            )}

            {/* ── Ghost opacity controls (POST mode only) ── */}
            {photoType === 'post' && ghostImageUrl && (
              <div className="absolute bottom-16 left-4 right-4 z-30">
                <div className="bg-black/70 backdrop-blur-sm rounded-2xl px-4 py-3">
                  <div className="flex items-center gap-3">
                    <span className="text-white/60 text-xs w-10">Ghost</span>
                    <input
                      type="range"
                      min="0" max="0.6" step="0.05"
                      value={ghostOpacity}
                      onChange={e => setGhostOpacity(parseFloat(e.target.value))}
                      className="flex-1 accent-amber-400 h-1.5"
                    />
                    <span className="text-white/60 text-xs w-7 text-right">
                      {Math.round(ghostOpacity * 100)}%
                    </span>
                    <button
                      onClick={() => setShowGhost(v => !v)}
                      className={`px-2.5 py-1 rounded-full text-xs font-bold transition-colors ${
                        showGhost ? 'bg-amber-500 text-black' : 'bg-white/15 text-white/50'
                      }`}
                    >
                      {showGhost ? 'ON' : 'OFF'}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ── Camera error ── */}
            {error && (
              <div className="absolute inset-0 z-40 flex items-center justify-center p-6"
                style={{background:'rgba(8,13,26,0.9)', backdropFilter:'blur(10px)'}}>
                <div className="rounded-2xl p-6 text-center max-w-xs w-full"
                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}>
                  <div className="text-4xl mb-3">📷</div>
                  <p className="text-white text-sm mb-5 leading-relaxed">{error}</p>
                  <button onClick={startCamera}
                    className="w-full py-3 rounded-xl text-white font-semibold btn-primary">
                    Retry
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* ── Bottom controls ── */}
          <div className="bg-black/95 backdrop-blur-xl pt-5 px-8 pb-safe">
            <div className="flex items-center justify-between max-w-xs mx-auto">

              {/* Close */}
              <button
                onClick={onClose}
                className="w-14 h-14 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white text-xl active:scale-90 transition-transform"
                aria-label="Close camera"
              >
                ✕
              </button>

              {/* Capture (large, glove-friendly) — glows when all conditions met */}
              <button
                onClick={capturePhoto}
                disabled={!isReady || isCapturing}
                aria-label="Take photo"
                className={`relative capture-btn w-24 h-24 rounded-full border-[5px] flex items-center justify-center active:scale-90 transition-all duration-300 ${
                  (!isReady || isCapturing) ? 'opacity-40 cursor-not-allowed border-white' : ''
                } ${
                  captureReady && isReady && !isCapturing
                    ? 'border-emerald-400 shadow-[0_0_20px_rgba(52,211,153,0.5)]'
                    : isReady && !isCapturing ? 'border-white/60' : ''
                }`}
              >
                <div className={`w-[4.5rem] h-[4.5rem] rounded-full transition-all duration-300 ${
                  isCapturing ? 'scale-90' : ''
                } ${
                  captureReady && isReady && !isCapturing
                    ? 'bg-emerald-400'
                    : photoType === 'pre' ? 'bg-emerald-500/70' : 'bg-amber-500/70'
                }`} />
              </button>

              {/* Focus lock */}
              <button
                onClick={() => applyLock(!isLocked)}
                className={`w-14 h-14 rounded-full border flex items-center justify-center text-xl active:scale-90 transition-transform ${
                  isLocked
                    ? 'bg-amber-500/25 border-amber-400 text-amber-300'
                    : 'bg-white/10   border-white/20  text-white'
                }`}
                aria-label={isLocked ? 'Unlock camera' : 'Lock focus & exposure'}
              >
                {isLocked ? '🔒' : '🔓'}
              </button>
            </div>

            {/* Dynamic coaching from ReadinessHUD */}
            <p className={`text-center text-xs mt-3 pb-1 transition-colors duration-300 ${
              captureReady ? 'text-emerald-400 font-bold' : 'text-white/45'
            }`}>
              {coaching || 'Preparing…'}
            </p>
          </div>
        </div>
      );
    }

    /* ── 8. GhostSelector ──────────────────────────────────────────── */
    function GhostSelector({ photos, captureMode, onSelect, onSkip }) {
      const candidates = photos.filter(p =>
        p.captureMode === captureMode && p.photoType === 'pre'
      );

      return (
        <div className="fixed inset-0 z-50 flex flex-col" style={{background:'var(--pg-bg)'}}>
          <div className="pt-safe px-5 pb-4"
            style={{background:'var(--pg-surface)', borderBottom:'1px solid var(--pg-border)'}}>
            <h2 className="text-white text-[18px] font-bold">Ghost Reference</h2>
            <p className="text-white/40 text-sm mt-1">
              Select a PRE photo to overlay for alignment guidance
            </p>
          </div>

          <div className="flex-1 overflow-y-auto no-scroll p-4">
            {candidates.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-48 text-center gap-4">
                <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl"
                  style={{background:'var(--pg-surface)', border:'1px solid var(--pg-border)'}}>
                  👻
                </div>
                <p className="text-white/40 text-sm">
                  No PRE photos for {CAPTURE_MODES[captureMode]?.label} yet
                </p>
              </div>
            ) : (
              <div className="grid grid-cols-2 gap-3">
                {candidates.map(photo => (
                  <button key={photo.id} onClick={() => onSelect(photo)}
                    className="relative rounded-2xl overflow-hidden aspect-[3/4] active:scale-95 transition-transform"
                    style={{border:'2px solid var(--pg-border)'}}>
                    <img src={photo.dataUrl || photo.downloadUrl} alt="" className="w-full h-full object-cover" />
                    <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent px-3 py-2">
                      <p className="text-white/65 text-xs">
                        {new Date(photo.timestamp).toLocaleDateString()}
                      </p>
                    </div>
                  </button>
                ))}
              </div>
            )}
          </div>

          <div className="px-4 pb-safe pt-3" style={{borderTop:'1px solid var(--pg-footer-bd)'}}>
            <button onClick={onSkip}
              className="w-full py-4 rounded-xl text-white/70 font-semibold text-[15px] active:scale-[0.98] transition-transform btn-secondary">
              Continue Without Ghost
            </button>
          </div>
        </div>
      );
    }

    /* ── 9. AddPatientModal ────────────────────────────────────────── */
    function AddPatientModal({ onAdd, onClose }) {
      const [name,      setName]      = useState('');
      const [patientId, setPatientId] = useState('');
      const [dob,       setDob]       = useState('');
      const [notes,     setNotes]     = useState('');

      const submit = (e) => {
        e.preventDefault();
        if (!name.trim()) return;
        onAdd({
          id:        patientId.trim() || `P${Date.now()}`,
          name:      name.trim(),
          dob,
          notes:     notes.trim(),
          createdAt: Date.now(),
        });
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end"
          style={{background:'var(--pg-overlay)', backdropFilter:'blur(8px)'}}>
          <div className="w-full rounded-t-3xl px-5 pt-4 pb-safe slide-up"
            style={{background:'var(--pg-modal)', border:'1px solid var(--pg-border-hi)', borderBottom:'none'}}>
            {/* Drag handle */}
            <div className="drag-handle" />
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-white text-[18px] font-bold">New Patient</h2>
              <button onClick={onClose}
                className="w-8 h-8 rounded-xl flex items-center justify-center active:opacity-70"
                style={{background:'var(--pg-surface-hi)'}}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M1 1l10 10M11 1L1 11" stroke="var(--pg-t2)" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </button>
            </div>
            <form onSubmit={submit} className="space-y-3.5">
              <div>
                <label className="section-label block mb-1.5">Full Name *</label>
                <input type="text" required autoFocus value={name}
                  onChange={e => setName(e.target.value)}
                  placeholder="Patient full name"
                  className="field-input w-full rounded-xl px-4 py-3.5 text-white placeholder-white/25 text-[15px]"
                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}
                />
              </div>
              <div>
                <label className="section-label block mb-1.5">Patient / Chart ID</label>
                <input type="text" value={patientId}
                  onChange={e => setPatientId(e.target.value)}
                  placeholder="Auto-generated if blank"
                  className="field-input w-full rounded-xl px-4 py-3.5 text-white placeholder-white/25 text-[15px]"
                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}
                />
              </div>
              <div>
                <label className="section-label block mb-1.5">Date of Birth</label>
                <input type="date" value={dob}

                  style={{background:'var(--pg-input)', border:'1px solid var(--pg-input-bd)'}}
                />

              <div>
                <label className="section-label block mb-1.5">Clinical Notes</label>
                <textarea rows={2} value={notes}
                  onChange={e => setNotes(e.target.value)}
